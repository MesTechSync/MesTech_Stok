<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2855AC" />
  <title>MesTech — Cevrimdisi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F8FAFC;
      color: #1E293B;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 1rem;
    }
    .container { max-width: 420px; }
    .logo {
      width: 80px;
      height: 80px;
      background: #2855AC;
      border-radius: 20px;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 2rem;
      font-weight: 700;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      color: #2855AC;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #64748B;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #2855AC;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: #1E3F8A; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">M</div>
    <h1>Baglanti Yok</h1>
    <p>
      Internet baglantiniz kesilmis gorunuyor.
      Lutfen baglantinizi kontrol edip tekrar deneyin.
    </p>
    <button class="btn" onclick="window.location.reload()">Tekrar Dene</button>
  </div>
</body>
</html>
