# MesTech Stok - Production Override
# Kullanim: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
#
# KURALLAR:
#   1. Veritabani portlari host'a ACILMAZ (container-arasi network kullanilir)
#   2. RabbitMQ management sadece localhost'tan erisilebilir
#   3. CHANGE_ME default'lari KALDIRILDI — tum credential .env'den gelmeli
#   4. MinIO console disariya ACILMAZ
#   5. Seq UI sadece localhost'tan erisilebilir

services:
  postgres:
    image: pgvector/pgvector:pg17@sha256:4d015894147ed169e4d2b2e14505cb99333c868e75663f586c217ba786c800d1
    cpus: 2.0
    pids_limit: 200
    ports: !override
      # Host'a port ACMA — sadece Docker network uzerinden erisim
      []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER zorunlu — .env dosyasini kontrol edin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD zorunlu — .env dosyasini kontrol edin}
      POSTGRES_DB: ${PG_DATABASE:?PG_DATABASE zorunlu — .env dosyasini kontrol edin}
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  redis:
    image: redis:7.4-alpine@sha256:4bfd9eca23339865dc14fe75f6d9ae643f714924623978dd2798f1a673b08f43
    cpus: 1.0
    pids_limit: 100
    ports: !override
      []
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD zorunlu — .env dosyasini kontrol edin}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --loglevel warning
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine@sha256:3c498e636fd64462480c5f9ff842eb224ab84160a8ada1ded5375e9569e9230c
    cpus: 1.0
    pids_limit: 150
    ports: !override
      - "5672"
      - "127.0.0.1:3692:15672"
      - "15692"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER zorunlu — .env dosyasini kontrol edin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD zorunlu — .env dosyasini kontrol edin}
      RABBITMQ_PLUGINS: "rabbitmq_management,rabbitmq_prometheus"
    restart: always

  mysql:
    image: mysql:8.0@sha256:ce4d5c5f9df534fb059e6826805ad7dc3cb431589d4d99cc0869f5ee766e0f47
    cpus: 1.0
    pids_limit: 150
    ports: !override
      []
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD zorunlu — .env dosyasini kontrol edin}
      MYSQL_DATABASE: opencart_stok
    restart: always

  seq:
    image: datalust/seq:2024.1@sha256:95b41ddda7bc31825bc9f7ba9331aab6daec13524c2992601c0ddd53129ad43c
    cpus: 0.5
    pids_limit: 100
    ports: !override
      - "5341"
      - "127.0.0.1:3580:80"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "${SEQ_ADMIN_PASSWORD:?SEQ_ADMIN_PASSWORD zorunlu — .env dosyasini kontrol edin}"
    restart: always

  webapi:
    cpus: 1.0
    pids_limit: 150
    ports:
      - "${WEBAPI_PORT:-3100}:3100"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${PG_DATABASE:?PG_DATABASE zorunlu};Username=${POSTGRES_USER:?POSTGRES_USER zorunlu};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD zorunlu}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:?REDIS_PASSWORD zorunlu}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER:?RABBITMQ_USER zorunlu}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD zorunlu}"
      Seq__ServerUrl: "http://seq:5341"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: always

  blazor:
    cpus: 1.0
    pids_limit: 150
    ports:
      - "${BLAZOR_PORT:-3200}:3200"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${PG_DATABASE:?PG_DATABASE zorunlu};Username=${POSTGRES_USER:?POSTGRES_USER zorunlu};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD zorunlu}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:?REDIS_PASSWORD zorunlu}"
      Seq__ServerUrl: "http://seq:5341"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3200/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: always

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z@sha256:e18c64a852e81bb76d5be1c8d8318694adf18d0b517e49a96fc9402dbcdc396a
    cpus: 1.0
    pids_limit: 100
    ports: !override
      - "9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER zorunlu — .env dosyasini kontrol edin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD zorunlu — .env dosyasini kontrol edin}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  nginx:
    image: nginx:1.25-alpine@sha256:721fa00bc549df26b3e67cc558ff176112d4ba69847537766f3c28e171d180e7
    cpus: 0.5
    pids_limit: 100
    ports:
      - "80:80"
      - "443:443"
    restart: always

  prometheus:
    image: prom/prometheus:v2.51.0@sha256:3305cd2e483c13364c94ae4905368eb425c9fa804f8e523ee47d8bf4de9d87a2
    cpus: 0.5
    pids_limit: 100
    ports: !override
      - "127.0.0.1:3090:9090"
    restart: always

  grafana:
    image: grafana/grafana:10.4.1@sha256:8b10c3744b8fede79af784d967911691d0e2d6e505512d1466ae1dbcaf745033
    cpus: 0.5
    pids_limit: 100
    ports: !override
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER zorunlu — .env dosyasini kontrol edin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD zorunlu — .env dosyasini kontrol edin}
    restart: always
