<!DOCTYPE html>
<!--
  MesTech Stok Panel - WooCommerce Dashboard
  Version: 1.0.0
  Date: 2026-04-01
  Author: DEV 2 (Frontend & UI/UX)
  Status: ACTIVE

  FEATURES:
  - 4 KPI cards: Aktif Urun, Siparis, Ciro, Site Durumu
  - Products table with stock status
  - Orders table with fulfillment status
  - API settings section (Site URL, Consumer Key, Consumer Secret)
  - Chart.js: Order distribution (pie)
  - DOM-SAFE: createElement + textContent only (no innerHTML)
  - Dark mode [data-theme="dark"]
  - Responsive breakpoints

  DEPENDENCIES:
  - Bootstrap 5.3.0
  - FontAwesome 6.4.0
  - Chart.js 4.4.0
-->
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net cdnjs.cloudflare.com fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' cdnjs.cloudflare.com fonts.gstatic.com; connect-src 'self' localhost:*">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MesTech Panel - WooCommerce entegrasyon paneli">
  <meta name="theme-color" content="#96588A">
  <title>MesTech Stok - WooCommerce Dashboard</title>

  <!-- CDN Libraries -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0" integrity="sha384-e6nUZLBkQ86NJ6TVVKAeSaK8jWa3NhkYWZFomE39AvDbQWeie9PlQqM3pmYW5d1g" crossorigin="anonymous"></script>

  <style>
    :root {
      --mestech-primary: #96588A;
      --mestech-primary-hover: #7d4874;
      --mestech-bg: #f4f5f7;
      --mestech-card-bg: #ffffff;
      --mestech-text: #1e293b;
      --mestech-text-secondary: #64748b;
      --mestech-text-muted: #94a3b8;
      --mestech-border: #e2e8f0;
      --mestech-success: #10b981;
      --mestech-danger: #ef4444;
      --mestech-warning: #f59e0b;
      --mestech-info: #3b82f6;
      --mestech-purple: #7c3aed;
      --mestech-radius: 12px;
      --mestech-shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --mestech-shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] {
      --mestech-bg: #0f172a;
      --mestech-card-bg: #1e293b;
      --mestech-text: #f1f5f9;
      --mestech-text-secondary: #94a3b8;
      --mestech-border: #334155;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--mestech-bg);
      color: var(--mestech-text);
      margin: 0;
      padding: 0;
    }

    #root {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .dashboard-main {
      flex: 1;
      padding: 24px;
      max-width: 1800px;
      margin: 0 auto;
      width: 100%;
    }

    .page-header-bar {
      background: linear-gradient(135deg, var(--mestech-primary), var(--mestech-primary-hover));
      color: #fff;
      padding: 20px 24px;
      margin-bottom: 24px;
      border-radius: var(--mestech-radius);
    }
    .page-header-bar .breadcrumb-item a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
    }
    .page-header-bar .breadcrumb-item.active { color: #fff; }

    .kpi-card {
      background: var(--mestech-card-bg);
      border: none;
      border-radius: var(--mestech-radius);
      box-shadow: var(--mestech-shadow-sm);
      padding: 20px;
      height: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .kpi-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--mestech-shadow-md);
    }
    .kpi-icon-badge {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .data-card {
      background: var(--mestech-card-bg);
      border: none;
      border-radius: var(--mestech-radius);
      box-shadow: var(--mestech-shadow-sm);
      margin-bottom: 24px;
    }
    .data-card .card-header-custom {
      background: var(--mestech-card-bg);
      border-bottom: 1px solid var(--mestech-border);
      padding: 16px 20px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: var(--mestech-radius) var(--mestech-radius) 0 0;
    }
    .data-card .card-body-custom {
      padding: 20px;
    }

    .chart-wrapper {
      position: relative;
      height: 280px;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--mestech-border);
    }
    .setting-row:last-child { border-bottom: none; }

    .fallback-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--mestech-text-muted);
    }
    .fallback-state i {
      font-size: 2rem;
      margin-bottom: 12px;
      display: block;
    }

    .skeleton {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    @media (max-width: 767px) {
      .dashboard-main { padding: 12px; }
      .page-header-bar { padding: 16px; }
    }
    @media print {
      .sidebar, .navbar, .btn, .no-print, nav, footer { display: none !important; }
      .content, .main-content, main { width: 100% !important; margin: 0 !important; }
      body { background: white !important; color: black !important; font-size: 12pt !important; }
      .card { box-shadow: none !important; border: 1px solid #ddd !important; break-inside: avoid; }
      table { font-size: 10pt; }
    }
  </style>
</head>
<body>
  <noscript><div class="alert alert-warning text-center m-3">Bu sayfa JavaScript gerektirir. Lutfen tarayicinizda JavaScript'i etkinlestirin.</div></noscript>
  <div id="root">
    <div id="header-component"></div>
    <div id="sidebar-component"></div>

    <main class="dashboard-main">

      <!-- Page Header -->
      <div class="page-header-bar">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
          <div>
            <h4 class="mb-1 fw-bold"><i class="fab fa-wordpress me-2"></i>WooCommerce Dashboard</h4>
            <nav aria-label="breadcrumb">
              <ol class="breadcrumb mb-0" style="font-size: 0.85rem;">
                <li class="breadcrumb-item"><a href="#">MesTech</a></li>
                <li class="breadcrumb-item"><a href="#">Platform</a></li>
                <li class="breadcrumb-item active">WooCommerce</li>
              </ol>
            </nav>
          </div>
          <div class="d-flex align-items-center gap-2">
            <button data-theme-toggle class="btn btn-sm btn-outline-light" title="Koyu temaya gec">
              <i class="fas fa-moon"></i>
            </button>
            <div class="text-end">
              <small class="d-block opacity-75">Son guncelleme</small>
              <strong id="last-update-time">--:--:--</strong>
            </div>
          </div>
        </div>
      </div>

      <!-- KPI Cards -->
      <div class="row g-3 mb-4" id="kpi-row"></div>

      <!-- Charts + Settings Row -->
      <div class="row g-4 mb-4">
        <div class="col-lg-5">
          <div class="data-card">
            <div class="card-header-custom">
              <span><i class="fas fa-chart-pie me-2 text-info"></i>Siparis Dagilimi</span>
            </div>
            <div class="card-body-custom">
              <div class="chart-wrapper">
                <canvas id="orderPieChart"></canvas>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-7">
          <div class="data-card">
            <div class="card-header-custom">
              <span><i class="fas fa-cog me-2 text-secondary"></i>WooCommerce API Ayarlari</span>
            </div>
            <div class="card-body-custom" id="api-settings-body"></div>
          </div>
        </div>
      </div>

      <!-- Tables Row -->
      <div class="row g-4">
        <div class="col-lg-7">
          <div class="data-card">
            <div class="card-header-custom">
              <span><i class="fas fa-boxes-stacked me-2" style="color: var(--mestech-primary);"></i>Urunler</span>
              <span class="badge" style="background: var(--mestech-primary);" id="product-count-badge">0</span>
            </div>
            <div class="card-body-custom" id="products-table-body">
              <div style="display:flex;align-items:center;justify-content:center;padding:40px;">
                <div class="spinner-border" style="color: var(--mestech-primary);" role="status">
                  <span class="visually-hidden">Yukleniyor...</span>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="data-card">
            <div class="card-header-custom">
              <span><i class="fas fa-shopping-cart me-2 text-warning"></i>Son Siparisler</span>
              <span class="badge bg-warning text-dark" id="order-count-badge">0</span>
            </div>
            <div class="card-body-custom" id="orders-table-body">
              <div style="display:flex;align-items:center;justify-content:center;padding:40px;">
                <div class="spinner-border" style="color: var(--mestech-primary);" role="status">
                  <span class="visually-hidden">Yukleniyor...</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </main>
    <div id="footer-component"></div>
  </div>

  <script>
  // ========================================
  // MesTech Stok Panel - WooCommerce Dashboard
  // DEV 2 — Platform Integration
  // DOM-SAFE: No innerHTML usage (XSS hardening)
  // ========================================

  (function() {
    'use strict';

    const API_BASE = '/api/v1/woocommerce';
    let orderPieChart = null;

    // ========================================
    // DOM Helper Utilities (XSS-safe)
    // ========================================
    function el(tag, attrs, children) {
      const node = document.createElement(tag);
      if (attrs) {
        Object.keys(attrs).forEach(function(key) {
          if (key === 'className') { node.className = attrs[key]; }
          else if (key === 'style' && typeof attrs[key] === 'object') {
            Object.keys(attrs[key]).forEach(function(p) { node.style[p] = attrs[key][p]; });
          } else if (key === 'textContent') { node.textContent = attrs[key]; }
          else { node.setAttribute(key, attrs[key]); }
        });
      }
      if (children) {
        if (!Array.isArray(children)) children = [children];
        children.forEach(function(child) {
          if (typeof child === 'string') node.appendChild(document.createTextNode(child));
          else if (child instanceof Node) node.appendChild(child);
        });
      }
      return node;
    }

    function clearChildren(p) { while (p.firstChild) p.removeChild(p.firstChild); }

    function formatCurrency(v) {
      if (typeof v !== 'number') return '0';
      return v.toLocaleString('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    // ========================================
    // Mock Data (API fallback)
    // ========================================
    const MOCK = {
      kpi: { activeProducts: 218, orderCount: 76, revenue: 94200, siteStatus: 'active' },
      products: [
        { name: 'El Yapimi Seramik Kupa', sku: 'WC-SRM-001', price: 189.90, stock: 64, status: 'publish' },
        { name: 'Dogal Sabun Seti', sku: 'WC-SBN-015', price: 129.00, stock: 120, status: 'publish' },
        { name: 'Ahsap Kesme Tahtasi', sku: 'WC-AKT-007', price: 349.00, stock: 0, status: 'draft' },
        { name: 'Organik Bal 500g', sku: 'WC-BAL-022', price: 279.00, stock: 38, status: 'publish' },
        { name: 'Pamuk Canta', sku: 'WC-CNT-009', price: 89.90, stock: 95, status: 'publish' }
      ],
      orders: [
        { id: '#WC2087', customer: 'Selin T.', total: 468.90, status: 'completed', date: '2026-03-31' },
        { id: '#WC2086', customer: 'Burak E.', total: 349.00, status: 'processing', date: '2026-03-31' },
        { id: '#WC2085', customer: 'Ayse M.', total: 918.00, status: 'on-hold', date: '2026-03-30' },
        { id: '#WC2084', customer: 'Emre K.', total: 129.00, status: 'cancelled', date: '2026-03-30' },
        { id: '#WC2083', customer: 'Deniz S.', total: 558.90, status: 'completed', date: '2026-03-29' }
      ],
      orderDistribution: {
        labels: ['Tamamlanan', 'Isleniyor', 'Beklemede', 'Iptal'],
        values: [38, 18, 12, 8]
      }
    };

    // ========================================
    // KPI Cards (DOM-SAFE)
    // ========================================
    const kpiDefs = [
      { id: 'active-products', title: 'Aktif Urun', icon: 'fas fa-boxes-stacked', iconBg: 'rgba(150,88,138,0.15)', iconColor: '#96588A', dataKey: 'activeProducts', format: function(v) { return formatCurrency(v); } },
      { id: 'order-count', title: 'Siparis', icon: 'fas fa-shopping-cart', iconBg: 'rgba(245,158,11,0.12)', iconColor: '#f59e0b', dataKey: 'orderCount', format: function(v) { return formatCurrency(v); } },
      { id: 'revenue', title: 'Ciro', icon: 'fas fa-turkish-lira-sign', iconBg: 'rgba(59,130,246,0.12)', iconColor: '#3b82f6', dataKey: 'revenue', format: function(v) { return '\u20BA' + formatCurrency(v); } },
      { id: 'site-status', title: 'Site Durumu', icon: 'fas fa-globe', iconBg: 'rgba(16,185,129,0.12)', iconColor: '#10b981', dataKey: 'siteStatus', format: function(v) { return v === 'active' ? 'Aktif' : 'Pasif'; } }
    ];

    function renderKpiCards(data) {
      const container = document.getElementById('kpi-row');
      clearChildren(container);
      kpiDefs.forEach(function(kpi) {
        const value = data && data[kpi.dataKey] != null ? data[kpi.dataKey] : 0;
        const col = el('div', { className: 'col-xl-3 col-md-6 col-sm-6' });
        const card = el('div', { className: 'kpi-card' });
        const topRow = el('div', { className: 'd-flex justify-content-between align-items-start mb-3' });
        topRow.appendChild(el('span', { className: 'text-muted small text-uppercase', textContent: kpi.title }));
        const iconBadge = el('span', { className: 'kpi-icon-badge' });
        iconBadge.style.background = kpi.iconBg;
        iconBadge.style.color = kpi.iconColor;
        iconBadge.appendChild(el('i', { className: kpi.icon }));
        topRow.appendChild(iconBadge);
        const valueEl = el('h3', { className: 'mb-0 fw-bold', textContent: kpi.format(value) });
        valueEl.style.fontSize = '1.6rem';
        card.appendChild(topRow);
        card.appendChild(valueEl);
        col.appendChild(card);
        container.appendChild(col);
      });
    }

    function renderKpiSkeletons() {
      const container = document.getElementById('kpi-row');
      clearChildren(container);
      for (let i = 0; i < 4; i++) {
        const col = el('div', { className: 'col-xl-3 col-md-6 col-sm-6' });
        const card = el('div', { className: 'kpi-card' });
        const s1 = el('div', { className: 'skeleton' }); s1.style.height = '16px'; s1.style.width = '50%'; s1.style.marginBottom = '16px';
        const s2 = el('div', { className: 'skeleton' }); s2.style.height = '32px'; s2.style.width = '70%';
        card.appendChild(s1); card.appendChild(s2);
        col.appendChild(card); container.appendChild(col);
      }
    }

    // ========================================
    // Products Table (DOM-SAFE)
    // ========================================
    function renderProductsTable(products) {
      const container = document.getElementById('products-table-body');
      const badge = document.getElementById('product-count-badge');
      clearChildren(container);
      if (!products || products.length === 0) {
        container.appendChild(el('div', { className: 'fallback-state' }, [
          el('i', { className: 'fas fa-boxes-stacked text-muted' }),
          el('p', { textContent: 'Urun verisi bulunamadi' })
        ]));
        badge.textContent = '0';
        return;
      }
      badge.textContent = String(products.length);
      const table = el('table', { className: 'table table-hover mb-0' });
      const thead = el('thead');
      const headRow = el('tr');
      ['Urun', 'SKU', 'Fiyat', 'Stok', 'Durum'].forEach(function(h) {
        headRow.appendChild(el('th', { className: 'small text-muted text-uppercase', textContent: h }));
      });
      thead.appendChild(headRow);
      table.appendChild(thead);
      const tbody = el('tbody');
      products.forEach(function(p) {
        const tr = el('tr');
        tr.appendChild(el('td', { className: 'small fw-medium', textContent: p.name || '--' }));
        const skuCell = el('td');
        skuCell.appendChild(el('code', { className: 'small', textContent: p.sku || '--' }));
        tr.appendChild(skuCell);
        tr.appendChild(el('td', { className: 'small', textContent: '\u20BA' + formatCurrency(p.price || 0) }));
        const stockCell = el('td');
        const stockVal = p.stock != null ? p.stock : 0;
        stockCell.appendChild(el('span', {
          className: 'badge ' + (stockVal > 20 ? 'bg-success-subtle text-success' : stockVal > 0 ? 'bg-warning-subtle text-warning' : 'bg-danger-subtle text-danger'),
          textContent: String(stockVal)
        }));
        tr.appendChild(stockCell);
        const statusCell = el('td');
        const dot = el('span', { className: 'status-dot' });
        dot.style.backgroundColor = p.status === 'publish' ? '#10b981' : '#94a3b8';
        statusCell.appendChild(dot);
        statusCell.appendChild(document.createTextNode(p.status === 'publish' ? 'Yayinda' : 'Taslak'));
        tr.appendChild(statusCell);
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      container.appendChild(table);
    }

    // ========================================
    // Orders Table (DOM-SAFE)
    // ========================================
    function renderOrdersTable(orders) {
      const container = document.getElementById('orders-table-body');
      const badge = document.getElementById('order-count-badge');
      clearChildren(container);
      if (!orders || orders.length === 0) {
        container.appendChild(el('div', { className: 'fallback-state' }, [
          el('i', { className: 'fas fa-shopping-cart text-muted' }),
          el('p', { textContent: 'Siparis verisi bulunamadi' })
        ]));
        badge.textContent = '0';
        return;
      }
      badge.textContent = String(orders.length);
      const table = el('table', { className: 'table table-hover mb-0' });
      const thead = el('thead');
      const headRow = el('tr');
      ['Siparis', 'Musteri', 'Tutar', 'Durum'].forEach(function(h) {
        headRow.appendChild(el('th', { className: 'small text-muted text-uppercase', textContent: h }));
      });
      thead.appendChild(headRow);
      table.appendChild(thead);
      const tbody = el('tbody');
      const statusMap = {
        completed: { cls: 'bg-success-subtle text-success', text: 'Tamamlandi' },
        processing: { cls: 'bg-info-subtle text-info', text: 'Isleniyor' },
        'on-hold': { cls: 'bg-warning-subtle text-warning', text: 'Beklemede' },
        cancelled: { cls: 'bg-danger-subtle text-danger', text: 'Iptal' }
      };
      orders.forEach(function(o) {
        const tr = el('tr');
        tr.appendChild(el('td', { className: 'small fw-medium', textContent: o.id || '--' }));
        tr.appendChild(el('td', { className: 'small', textContent: o.customer || '--' }));
        tr.appendChild(el('td', { className: 'small', textContent: '\u20BA' + formatCurrency(o.total || 0) }));
        const sCell = el('td');
        const sInfo = statusMap[o.status] || { cls: 'bg-secondary-subtle text-secondary', text: o.status || '--' };
        sCell.appendChild(el('span', { className: 'badge ' + sInfo.cls, textContent: sInfo.text }));
        tr.appendChild(sCell);
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      container.appendChild(table);
    }

    // ========================================
    // Order Distribution Chart (Chart.js)
    // ========================================
    function renderOrderPieChart(data) {
      const canvas = document.getElementById('orderPieChart');
      if (!canvas) return;
      if (orderPieChart) { orderPieChart.destroy(); orderPieChart = null; }
      if (!data || !data.labels || data.labels.length === 0) {
        const wrapper = canvas.parentElement;
        clearChildren(wrapper);
        wrapper.appendChild(el('div', { className: 'fallback-state' }, [
          el('i', { className: 'fas fa-chart-pie text-muted' }),
          el('p', { textContent: 'Grafik verisi yuklenemedi' })
        ]));
        return;
      }
      const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444'];
      orderPieChart = new Chart(canvas, {
        type: 'pie',
        data: {
          labels: data.labels,
          datasets: [{ data: data.values, backgroundColor: colors.slice(0, data.labels.length), borderWidth: 2, borderColor: '#fff' }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, padding: 12, font: { size: 11 } } } }
        }
      });
    }

    // ========================================
    // API Settings (DOM-SAFE)
    // ========================================
    function renderApiSettings(settings) {
      const container = document.getElementById('api-settings-body');
      clearChildren(container);
      const fields = [
        { key: 'siteUrl', label: 'Site URL', placeholder: 'https://magaza.com', icon: 'fas fa-globe', type: 'text' },
        { key: 'consumerKey', label: 'Consumer Key', placeholder: 'ck_xxxxx', icon: 'fas fa-key', type: 'password' },
        { key: 'consumerSecret', label: 'Consumer Secret', placeholder: 'cs_xxxxx', icon: 'fas fa-lock', type: 'password' }
      ];
      fields.forEach(function(f) {
        const row = el('div', { className: 'setting-row' });
        const left = el('div');
        const labelRow = el('div', { className: 'd-flex align-items-center gap-2' });
        labelRow.appendChild(el('i', { className: f.icon + ' text-muted' }));
        labelRow.appendChild(el('span', { className: 'fw-medium small', textContent: f.label }));
        left.appendChild(labelRow);
        row.appendChild(left);
        const input = el('input', {
          className: 'form-control form-control-sm',
          type: f.type,
          id: 'setting-' + f.key,
          placeholder: f.placeholder,
          'data-key': f.key
        });
        input.style.width = '220px';
        input.value = settings && settings[f.key] ? settings[f.key] : '';
        row.appendChild(input);
        container.appendChild(row);
      });
      const btnRow = el('div', { className: 'd-flex gap-2 mt-3' });
      const saveBtn = el('button', { className: 'btn btn-sm w-100', id: 'btn-save-api' }, [
        el('i', { className: 'fas fa-save me-2' }),
        document.createTextNode('Ayarlari Kaydet')
      ]);
      saveBtn.style.backgroundColor = 'var(--mestech-primary)';
      saveBtn.style.color = '#fff';
      saveBtn.addEventListener('click', saveApiSettings);
      const testBtn = el('button', { className: 'btn btn-outline-secondary btn-sm', id: 'btn-test-api' }, [
        el('i', { className: 'fas fa-plug me-2' }),
        document.createTextNode('Baglanti Test')
      ]);
      testBtn.addEventListener('click', testApiConnection);
      btnRow.appendChild(saveBtn);
      btnRow.appendChild(testBtn);
      container.appendChild(btnRow);
    }

    async function saveApiSettings() {
      const btn = document.getElementById('btn-save-api');
      btn.disabled = true;
      const settings = {};
      document.querySelectorAll('#api-settings-body [data-key]').forEach(function(input) {
        settings[input.getAttribute('data-key')] = input.value;
      });
      try {
        await fetch(API_BASE + '/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(settings) });
        showAlert('WooCommerce API ayarlari kaydedildi.', 'success');
      } catch (e) {
        console.error('WooCommerce ayar kaydetme hatasi:', e);
        showAlert('Ayarlar kaydedilemedi. Mock modunda calisiliyor.', 'warning');
      } finally { btn.disabled = false; }
    }

    async function testApiConnection() {
      const btn = document.getElementById('btn-test-api');
      btn.disabled = true;
      try {
        await fetch(API_BASE + '/test-connection');
        showAlert('WooCommerce baglantisi basarili.', 'success');
      } catch (e) {
        showAlert('Baglanti testi basarisiz. Mock modunda calisiliyor.', 'warning');
      } finally { btn.disabled = false; }
    }

    // ========================================
    // Alert Helper
    // ========================================
    function showAlert(message, type) {
      const existing = document.getElementById('page-alert');
      if (existing) existing.remove();
      const alertDiv = el('div', { className: 'alert alert-' + type + ' alert-dismissible fade show', id: 'page-alert', role: 'alert' });
      alertDiv.appendChild(document.createTextNode(message));
      const closeBtn = el('button', { className: 'btn-close', 'data-bs-dismiss': 'alert', 'aria-label': 'Kapat' });
      alertDiv.appendChild(closeBtn);
      const main = document.querySelector('.dashboard-main');
      const header = main.querySelector('.page-header-bar');
      if (header && header.nextSibling) main.insertBefore(alertDiv, header.nextSibling);
      else main.appendChild(alertDiv);
      setTimeout(function() { const a = document.getElementById('page-alert'); if (a) a.remove(); }, 5000);
    }

    // ========================================
    // API Data Loading with Mock Fallback
    // ========================================
    async function loadDashboardData() {
      renderKpiSkeletons();
      try {
        const response = await fetch(API_BASE + '/dashboard');
        if (!response.ok) throw new Error('API ' + response.status);
        const data = await response.json();
        renderKpiCards(data.kpi || MOCK.kpi);
        renderProductsTable(data.products || MOCK.products);
        renderOrdersTable(data.orders || MOCK.orders);
        renderOrderPieChart(data.orderDistribution || MOCK.orderDistribution);
        renderApiSettings(data.settings || {});
      } catch (e) {
        console.warn('WooCommerce API erisim hatasi, mock veri kullaniliyor:', e);
        renderKpiCards(MOCK.kpi);
        renderProductsTable(MOCK.products);
        renderOrdersTable(MOCK.orders);
        renderOrderPieChart(MOCK.orderDistribution);
        renderApiSettings({});
      }
      document.getElementById('last-update-time').textContent = new Date().toLocaleTimeString('tr-TR');
    }

    // ========================================
    // Theme Toggle
    // ========================================
    function initTheme() {
      const btn = document.querySelector('[data-theme-toggle]');
      if (!btn) return;
      btn.addEventListener('click', function() {
        const current = document.documentElement.getAttribute('data-theme');
        document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
      });
    }

    // ========================================
    // Initialization
    // ========================================
    function init() {
      initTheme();
      loadDashboardData();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  })();
  </script>
</body>
</html>
