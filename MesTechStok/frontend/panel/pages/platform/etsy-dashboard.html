<!DOCTYPE html>
<!--
  MesTech Stok Panel - Etsy Pazar Yeri Paneli
  Version: 1.0.0
  Date: 2026-04-01
  Author: DEV 2 (Frontend & UI/UX)
  Status: ACTIVE

  FEATURES:
  - 4 KPI cards: Aktif Urun, Siparis, Ciro, Magaza Puani
  - Products table with stock status
  - Orders table with order status
  - API Settings: API Key, Shop ID
  - Chart.js: Order status distribution (pie)
  - DOM-SAFE: createElement + textContent only (no innerHTML)
  - Dark mode [data-theme="dark"]
  - Responsive breakpoints

  DEPENDENCIES:
  - Bootstrap 5.3.0
  - FontAwesome 6.4.0
  - Chart.js 4.4.0
-->
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net cdnjs.cloudflare.com fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' cdnjs.cloudflare.com fonts.gstatic.com; connect-src 'self' localhost:*">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MesTech Panel - Etsy pazar yeri yonetim paneli">
  <meta name="theme-color" content="#F1641E">
  <title>MesTech Stok - Etsy Dashboard</title>

  <!-- CDN Libraries -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0" integrity="sha384-e6nUZLBkQ86NJ6TVVKAeSaK8jWa3NhkYWZFomE39AvDbQWeie9PlQqM3pmYW5d1g" crossorigin="anonymous"></script>

  <style>
    :root {
      --mestech-primary: #F1641E;
      --mestech-primary-hover: #d4540f;
      --mestech-bg: #f4f5f7;
      --mestech-card-bg: #ffffff;
      --mestech-text: #1e293b;
      --mestech-text-secondary: #64748b;
      --mestech-text-muted: #94a3b8;
      --mestech-border: #e2e8f0;
      --mestech-success: #10b981;
      --mestech-danger: #ef4444;
      --mestech-warning: #f59e0b;
      --mestech-info: #3b82f6;
      --mestech-purple: #7c3aed;
      --mestech-radius: 12px;
      --mestech-shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --mestech-shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] {
      --mestech-bg: #0f172a;
      --mestech-card-bg: #1e293b;
      --mestech-text: #f1f5f9;
      --mestech-text-secondary: #94a3b8;
      --mestech-border: #334155;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: var(--mestech-bg); color: var(--mestech-text); margin: 0; padding: 0; }
    #root { display: flex; flex-direction: column; min-height: 100vh; }
    .dashboard-main { flex: 1; padding: 24px; max-width: 1800px; margin: 0 auto; width: 100%; }
    .page-header-bar { background: linear-gradient(135deg, var(--mestech-primary), var(--mestech-primary-hover)); color: #fff; padding: 20px 24px; margin-bottom: 24px; border-radius: var(--mestech-radius); }
    .page-header-bar .breadcrumb-item a { color: rgba(255,255,255,0.7); text-decoration: none; }
    .page-header-bar .breadcrumb-item.active { color: #fff; }
    .kpi-card { background: var(--mestech-card-bg); border: none; border-radius: var(--mestech-radius); box-shadow: var(--mestech-shadow-sm); padding: 20px; height: 100%; transition: transform 0.2s, box-shadow 0.2s; }
    .kpi-card:hover { transform: translateY(-2px); box-shadow: var(--mestech-shadow-md); }
    .kpi-icon-badge { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .data-card { background: var(--mestech-card-bg); border: none; border-radius: var(--mestech-radius); box-shadow: var(--mestech-shadow-sm); margin-bottom: 24px; }
    .data-card .card-header-custom { background: var(--mestech-card-bg); border-bottom: 1px solid var(--mestech-border); padding: 16px 20px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; border-radius: var(--mestech-radius) var(--mestech-radius) 0 0; }
    .data-card .card-body-custom { padding: 20px; }
    .chart-wrapper { position: relative; height: 280px; }
    .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--mestech-border); }
    .setting-row:last-child { border-bottom: none; }
    .table { color: var(--mestech-text); }
    .table thead th { border-bottom: 2px solid var(--mestech-border); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; color: var(--mestech-text-secondary); }
    .table tbody td { border-bottom: 1px solid var(--mestech-border); vertical-align: middle; font-size: 0.9rem; }
    @media (max-width: 767px) { .dashboard-main { padding: 12px; } .page-header-bar { padding: 16px; } }
    @media print { .sidebar, .navbar, .btn, .no-print, nav, footer { display: none !important; } body { background: white !important; color: black !important; } .card { box-shadow: none !important; border: 1px solid #ddd !important; break-inside: avoid; } }
  </style>
</head>
<body>
  <noscript><div class="alert alert-warning text-center m-3">Bu sayfa JavaScript gerektirir. Lutfen tarayicinizda JavaScript'i etkinlestirin.</div></noscript>
  <div id="root">
    <div id="header-component"></div>
    <div id="sidebar-component"></div>

    <main class="dashboard-main">
      <!-- Page Header -->
      <div class="page-header-bar">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
          <div>
            <h4 class="mb-1 fw-bold"><i class="fab fa-etsy me-2"></i>Etsy Dashboard</h4>
            <nav aria-label="breadcrumb">
              <ol class="breadcrumb mb-0" style="font-size: 0.85rem;">
                <li class="breadcrumb-item"><a href="#">MesTech</a></li>
                <li class="breadcrumb-item"><a href="#">Platform</a></li>
                <li class="breadcrumb-item active">Etsy</li>
              </ol>
            </nav>
          </div>
          <div class="d-flex align-items-center gap-2">
            <button data-theme-toggle class="btn btn-sm btn-outline-light" title="Koyu temaya gec"><i class="fas fa-moon"></i></button>
            <div class="text-end">
              <small class="d-block opacity-75">Son guncelleme</small>
              <strong id="last-update-time">--:--:--</strong>
            </div>
          </div>
        </div>
      </div>

      <!-- KPI Cards -->
      <div class="row g-3 mb-4" id="kpi-row"></div>

      <!-- Charts Row -->
      <div class="row g-4 mb-4">
        <div class="col-lg-5">
          <div class="data-card">
            <div class="card-header-custom"><span><i class="fas fa-chart-pie me-2 text-info"></i>Siparis Durum Dagilimi</span></div>
            <div class="card-body-custom"><div class="chart-wrapper"><canvas id="orderStatusChart"></canvas></div></div>
          </div>
        </div>
        <div class="col-lg-7">
          <div class="data-card">
            <div class="card-header-custom"><span><i class="fas fa-chart-line me-2 text-success"></i>Aylik Ciro Trendi</span></div>
            <div class="card-body-custom"><div class="chart-wrapper"><canvas id="revenueTrendChart"></canvas></div></div>
          </div>
        </div>
      </div>

      <!-- Tables Row -->
      <div class="row g-4">
        <div class="col-lg-7">
          <div class="data-card">
            <div class="card-header-custom"><span><i class="fas fa-box me-2" style="color:var(--mestech-primary)"></i>Urunler</span></div>
            <div class="card-body-custom"><div class="table-responsive"><table class="table table-hover mb-0"><thead id="products-thead"></thead><tbody id="products-tbody"></tbody></table></div></div>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="data-card">
            <div class="card-header-custom"><span><i class="fas fa-shopping-cart me-2" style="color:var(--mestech-warning)"></i>Son Siparisler</span></div>
            <div class="card-body-custom"><div class="table-responsive"><table class="table table-hover mb-0"><thead id="orders-thead"></thead><tbody id="orders-tbody"></tbody></table></div></div>
          </div>
        </div>
      </div>

      <!-- API Settings -->
      <div class="row g-4 mt-2">
        <div class="col-lg-6">
          <div class="data-card">
            <div class="card-header-custom"><span><i class="fas fa-cog me-2 text-secondary"></i>Etsy API Ayarlari</span></div>
            <div class="card-body-custom" id="api-settings"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    'use strict';
    /* --- DOM-SAFE helpers --- */
    function el(tag, attrs, children) {
      const e = document.createElement(tag);
      if (attrs) Object.keys(attrs).forEach(function(k) { if (k === 'className') e.className = attrs[k]; else if (k === 'textContent') e.textContent = attrs[k]; else e.setAttribute(k, attrs[k]); });
      if (children) children.forEach(function(c) { if (c) e.appendChild(c); });
      return e;
    }

    /* --- Mock Data --- */
    const MOCK = {
      kpi: { aktifUrun: 245, siparis: 78, ciro: 12480, magazaPuani: 4.8 },
      products: [
        { ad: 'El Yapimi Kolye', sku: 'ETSY-001', fiyat: 89.90, stok: 45, durum: 'Aktif' },
        { ad: 'Ahsap Cerceve', sku: 'ETSY-002', fiyat: 129.00, stok: 12, durum: 'Aktif' },
        { ad: 'Seramik Kupa', sku: 'ETSY-003', fiyat: 65.00, stok: 0, durum: 'Tukendi' },
        { ad: 'Dokuma Canta', sku: 'ETSY-004', fiyat: 199.90, stok: 8, durum: 'Aktif' },
        { ad: 'Balmumu Mum', sku: 'ETSY-005', fiyat: 45.00, stok: 67, durum: 'Aktif' }
      ],
      orders: [
        { no: 'E-10045', tarih: '2026-03-31', tutar: 89.90, durum: 'Kargoda' },
        { no: 'E-10044', tarih: '2026-03-30', tutar: 258.00, durum: 'Hazirlaniyor' },
        { no: 'E-10043', tarih: '2026-03-29', tutar: 129.00, durum: 'Teslim Edildi' },
        { no: 'E-10042', tarih: '2026-03-28', tutar: 65.00, durum: 'Teslim Edildi' },
        { no: 'E-10041', tarih: '2026-03-27', tutar: 199.90, durum: 'Kargoda' }
      ],
      orderStatus: { Kargoda: 32, Hazirlaniyor: 18, 'Teslim Edildi': 25, Iptal: 3 },
      revenueTrend: { labels: ['Eki', 'Kas', 'Ara', 'Oca', 'Sub', 'Mar'], data: [8200, 9100, 11500, 10800, 11200, 12480] }
    };

    function fetchData(url) {
      return fetch(url).then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); }).catch(function() { return null; });
    }

    /* --- KPI Render --- */
    function renderKPIs(data) {
      const kpis = [
        { label: 'Aktif Urun', value: data.aktifUrun, icon: 'fas fa-box-open', color: 'var(--mestech-primary)', bg: 'rgba(241,100,30,0.12)' },
        { label: 'Siparis', value: data.siparis, icon: 'fas fa-shopping-bag', color: 'var(--mestech-info)', bg: 'rgba(59,130,246,0.12)' },
        { label: 'Ciro', value: data.ciro.toLocaleString('tr-TR') + ' $', icon: 'fas fa-dollar-sign', color: 'var(--mestech-success)', bg: 'rgba(16,185,129,0.12)' },
        { label: 'Magaza Puani', value: data.magazaPuani + ' / 5', icon: 'fas fa-star', color: 'var(--mestech-warning)', bg: 'rgba(245,158,11,0.12)' }
      ];
      const row = document.getElementById('kpi-row');
      kpis.forEach(function(k) {
        const col = el('div', { className: 'col-sm-6 col-xl-3' });
        const card = el('div', { className: 'kpi-card' });
        const d1 = el('div', { className: 'd-flex justify-content-between align-items-start' });
        const left = el('div');
        const lbl = el('small', { className: 'd-block text-secondary mb-1', textContent: k.label });
        const val = el('h3', { className: 'mb-0 fw-bold', textContent: String(k.value) });
        left.appendChild(lbl); left.appendChild(val);
        const badge = el('div', { className: 'kpi-icon-badge' }); badge.style.background = k.bg; badge.style.color = k.color;
        const icon = el('i', { className: k.icon }); badge.appendChild(icon);
        d1.appendChild(left); d1.appendChild(badge); card.appendChild(d1); col.appendChild(card); row.appendChild(col);
      });
    }

    /* --- Tables --- */
    function renderProductsTable(products) {
      const thead = document.getElementById('products-thead');
      const hrow = el('tr'); ['Urun Adi', 'SKU', 'Fiyat', 'Stok', 'Durum'].forEach(function(h) { hrow.appendChild(el('th', { textContent: h })); }); thead.appendChild(hrow);
      const tbody = document.getElementById('products-tbody');
      products.forEach(function(p) {
        const tr = el('tr');
        tr.appendChild(el('td', { className: 'fw-semibold', textContent: p.ad }));
        tr.appendChild(el('td', { textContent: p.sku }));
        tr.appendChild(el('td', { textContent: p.fiyat.toLocaleString('tr-TR', { minimumFractionDigits: 2 }) + ' $' }));
        tr.appendChild(el('td', { textContent: String(p.stok) }));
        const durumTd = el('td');
        const badge = el('span', { className: 'badge ' + (p.durum === 'Aktif' ? 'bg-success' : 'bg-danger'), textContent: p.durum });
        durumTd.appendChild(badge); tr.appendChild(durumTd); tbody.appendChild(tr);
      });
    }

    function renderOrdersTable(orders) {
      const thead = document.getElementById('orders-thead');
      const hrow = el('tr'); ['Siparis No', 'Tarih', 'Tutar', 'Durum'].forEach(function(h) { hrow.appendChild(el('th', { textContent: h })); }); thead.appendChild(hrow);
      const tbody = document.getElementById('orders-tbody');
      orders.forEach(function(o) {
        const tr = el('tr');
        tr.appendChild(el('td', { className: 'fw-semibold', textContent: o.no }));
        tr.appendChild(el('td', { textContent: o.tarih }));
        tr.appendChild(el('td', { textContent: o.tutar.toLocaleString('tr-TR', { minimumFractionDigits: 2 }) + ' $' }));
        const cls = o.durum === 'Teslim Edildi' ? 'bg-success' : o.durum === 'Kargoda' ? 'bg-info' : o.durum === 'Hazirlaniyor' ? 'bg-warning text-dark' : 'bg-danger';
        const durumTd = el('td'); durumTd.appendChild(el('span', { className: 'badge ' + cls, textContent: o.durum })); tr.appendChild(durumTd); tbody.appendChild(tr);
      });
    }

    /* --- API Settings --- */
    function renderAPISettings() {
      const container = document.getElementById('api-settings');
      const fields = [
        { label: 'API Key', id: 'etsy-api-key', type: 'password', placeholder: 'Etsy API anahtarinizi girin' },
        { label: 'Shop ID', id: 'etsy-shop-id', type: 'text', placeholder: 'Magaza ID numarasi' }
      ];
      fields.forEach(function(f) {
        const row = el('div', { className: 'setting-row' });
        row.appendChild(el('label', { className: 'form-label fw-semibold mb-0', textContent: f.label, for: f.id }));
        const input = el('input', { className: 'form-control', type: f.type, id: f.id, placeholder: f.placeholder, style: 'max-width:320px' });
        row.appendChild(input); container.appendChild(row);
      });
      const btnRow = el('div', { className: 'mt-3 text-end' });
      const btn = el('button', { className: 'btn btn-sm', textContent: 'Kaydet' }); btn.style.background = 'var(--mestech-primary)'; btn.style.color = '#fff';
      btnRow.appendChild(btn); container.appendChild(btnRow);
    }

    /* --- Charts --- */
    function initCharts(data) {
      if (typeof Chart === 'undefined') { setTimeout(function() { initCharts(data); }, 200); return; }
      new Chart(document.getElementById('orderStatusChart'), {
        type: 'pie',
        data: { labels: Object.keys(data.orderStatus), datasets: [{ data: Object.values(data.orderStatus), backgroundColor: ['#3b82f6', '#f59e0b', '#10b981', '#ef4444'] }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
      });
      new Chart(document.getElementById('revenueTrendChart'), {
        type: 'line',
        data: { labels: data.revenueTrend.labels, datasets: [{ label: 'Ciro ($)', data: data.revenueTrend.data, borderColor: '#F1641E', backgroundColor: 'rgba(241,100,30,0.1)', fill: true, tension: 0.3 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
      });
    }

    /* --- Theme Toggle --- */
    document.addEventListener('click', function(e) {
      if (e.target.closest('[data-theme-toggle]')) {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      }
    });

    /* --- Init --- */
    document.addEventListener('DOMContentLoaded', function() {
      fetchData('/api/platform/etsy/dashboard').then(function(data) {
        const d = data || MOCK;
        renderKPIs(d.kpi || MOCK.kpi);
        renderProductsTable(d.products || MOCK.products);
        renderOrdersTable(d.orders || MOCK.orders);
        renderAPISettings();
        initCharts({ orderStatus: d.orderStatus || MOCK.orderStatus, revenueTrend: d.revenueTrend || MOCK.revenueTrend });
        const ts = document.getElementById('last-update-time');
        ts.textContent = new Date().toLocaleTimeString('tr-TR');
      });
    });
  </script>
</body>
</html>
