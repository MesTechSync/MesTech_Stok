  (function() {

        keywords: 'kullanici rol yetki audit log yonetim'
      },
      {

        title: 'Sistem Ayarlari',
        duration: '~10dk',
        description: 'API anahtarlari, bildirim ayarlari ve yedekleme yapilandirmasi.',
        keywords: 'sistem ayar api anahtar bildirim yedekleme backup'
      }
    ];

    // ========================================
    // DOM Helper
    // ========================================
    function el(tag, attrs, children) {
      const node = document.createElement(tag);
      if (attrs) {
        Object.keys(attrs).forEach(function(key) {
          if (key === 'className') {
            node.className = attrs[key];
          } else if (key === 'textContent') {
            node.textContent = attrs[key];
          } else {
            node.setAttribute(key, attrs[key]);
          }
        });
      }
      if (children) {
        if (!Array.isArray(children)) children = [children];
        children.forEach(function(child) {
          if (typeof child === 'string') {
            node.appendChild(document.createTextNode(child));
          } else if (child instanceof Node) {
            node.appendChild(child);
          }
        });
      }
      return node;
    }

    function clearChildren(parent) {
      while (parent.firstChild) {
        parent.removeChild(parent.firstChild);
      }
    }

    // ========================================
    // LocalStorage Progress
    // ========================================
    function getCompleted() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : [];
      } catch (e) {
        return [];
      }
    }

    function isCompleted(lessonId) {
      return getCompleted().indexOf(lessonId) !== -1;
    }

    function updateProgressUI() {
      const completed = getCompleted();
      const count = completed.length;
      const percent = Math.round((count / 12) * 100);

      const countEl = document.getElementById('progress-count');
      const barEl = document.getElementById('progress-bar');
      const percentEl = document.getElementById('progress-percent');

      if (countEl) countEl.textContent = count.toString();
      if (barEl) {
        barEl.style.width = percent + '%';
        barEl.setAttribute('aria-valuenow', percent.toString());
      }
      if (percentEl) percentEl.textContent = '%' + percent;

      // Update card completed states
      lessons.forEach(function(lesson) {
        let card = document.getElementById('lesson-card-' + lesson.id);
        if (card) {
          if (completed.indexOf(lesson.id) !== -1) {
            card.classList.add('completed');
          } else {
            card.classList.remove('completed');
          }
        }
      });
    }

    // ========================================
    // Render Lesson Cards (DOM-SAFE)
    // ========================================
    function renderLessons() {
      const grid = document.getElementById('lessons-grid');
      clearChildren(grid);

      lessons.forEach(function(lesson) {
        const col = el('div', {
          className: 'col-md-4 col-sm-6 lesson-col',
          'data-search': (lesson.title + ' ' + lesson.description + ' ' + lesson.keywords).toLowerCase()
        });

        const card = el('div', {
          className: 'lesson-card',
          id: 'lesson-card-' + lesson.id
        });

        // Icon badge
        const iconBadge = el('div', { className: 'lesson-icon-badge' });
        iconBadge.style.background = lesson.iconBg;
        iconBadge.style.color = lesson.iconColor;
        iconBadge.appendChild(el('i', { className: lesson.icon }));
        card.appendChild(iconBadge);

        // Lesson number
        const numBadge = el('span', {
          className: 'lesson-number badge bg-primary mb-2',
          textContent: 'Ders ' + (lesson.id < 10 ? '0' + lesson.id : lesson.id)
        });
        card.appendChild(numBadge);

        // Title
        card.appendChild(el('h5', {
          textContent: lesson.title,
          'data-i18n': 'academy.lesson' + lesson.id + '.title'
        }));

        // Description
        card.appendChild(el('p', {
          className: 'lesson-desc',
          textContent: lesson.description,
          'data-i18n': 'academy.lesson' + lesson.id + '.desc'
        }));

        // Meta row
        const meta = el('div', { className: 'lesson-meta' });

        // Duration
        const duration = el('span', { className: 'lesson-duration' });
        duration.appendChild(el('i', { className: 'fas fa-clock me-1' }));
        duration.appendChild(document.createTextNode(lesson.duration));
        meta.appendChild(duration);

        // Button or completed badge
        if (isCompleted(lesson.id)) {
          const completedBadge = el('span', { className: 'completed-badge' });
          completedBadge.appendChild(el('i', { className: 'fas fa-check-circle me-1' }));
          completedBadge.appendChild(document.createTextNode('Tamamlandi'));
          meta.appendChild(completedBadge);

          const repeatBtn = el('a', {
            href: lesson.slug + '.html',
            className: 'btn btn-outline-success btn-start ms-2',
            textContent: 'Tekrar',
            'data-i18n': 'academy.repeat'
          });
          meta.appendChild(repeatBtn);
        } else {
          const startBtn = el('a', {
            href: lesson.slug + '.html',
            className: 'btn btn-primary btn-start',
            'data-i18n': 'academy.start'
          });
          startBtn.appendChild(el('i', { className: 'fas fa-play me-1' }));
          startBtn.appendChild(document.createTextNode('Basla'));
          meta.appendChild(startBtn);
        }

        card.appendChild(meta);
        col.appendChild(card);
        grid.appendChild(col);
      });
    }

    // ========================================
    // Search / Filter
    // ========================================
    function initSearch() {
      const searchInput = document.getElementById('lesson-search');
      if (!searchInput) return;

      searchInput.addEventListener('input', function() {
        const query = searchInput.value.toLowerCase().trim();
        const cols = document.querySelectorAll('.lesson-col');

        cols.forEach(function(col) {
          const searchData = col.getAttribute('data-search') || '';
          if (!query || searchData.indexOf(query) !== -1) {
            col.classList.remove('hidden');
          } else {
            col.classList.add('hidden');
          }
        });
      });
    }

    // ========================================
    // Initialization
    // ========================================
    function init() {
      renderLessons();
      updateProgressUI();
      initSearch();
    }

    // Make updateProgress available globally for lesson pages
    window.mesAcademyUpdateProgress = updateProgressUI;

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  })();
  </script>
