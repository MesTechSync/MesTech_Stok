<!DOCTYPE html>
<html lang="tr">
<head>
  <!--
    MesTech Panel — Kar/Zarar Raporu
    Version: 1.0.0
    Date: 2026-03-20
    Author: DEV 2 (Frontend & UI/UX)
    Task: İ-07-G5A Muhasebe & Finans Saglamlastirma
    Status: Active
    Features: KPI cards, platform breakdown, monthly trend chart, Excel export
    Dependencies: Bootstrap 5.3, FontAwesome 6.4, Chart.js 4.4, Inter font
  -->
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net cdnjs.cloudflare.com; img-src 'self' data: blob:; font-src 'self' cdnjs.cloudflare.com; connect-src 'self' localhost:*">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MesTech Panel - Kar zarar raporu ve platform analizi">
  <meta name="theme-color" content="#f27a1a">
  <title>MesTech — Kar/Zarar Raporu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --mestech-primary: #f27a1a;
      --mestech-primary-hover: #d96a10;
      --mestech-bg: #f4f5f7;
      --mestech-card-bg: #ffffff;
      --mestech-text: #1e293b;
      --mestech-text-secondary: #64748b;
      --mestech-text-muted: #94a3b8;
      --mestech-border: #e2e8f0;
      --mestech-success: #10b981;
      --mestech-danger: #ef4444;
      --mestech-warning: #f59e0b;
      --mestech-info: #3b82f6;
      --mestech-purple: #7c3aed;
      --mestech-radius: 12px;
      --mestech-shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --mestech-shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] {
      --mestech-bg: #0f172a;
      --mestech-card-bg: #1e293b;
      --mestech-text: #f1f5f9;
      --mestech-text-secondary: #94a3b8;
      --mestech-border: #334155;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--mestech-bg); color: var(--mestech-text); }
    .page-header { background: linear-gradient(135deg, var(--mestech-info), var(--mestech-purple)); padding: 24px; border-radius: var(--mestech-radius); margin-bottom: 20px; color: white; }
    .page-header h1 { font-size: 22px; font-weight: 700; }
    .page-header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
    .kpi-card { background: var(--mestech-card-bg); border-radius: var(--mestech-radius); padding: 20px; box-shadow: var(--mestech-shadow-sm); border: 1px solid var(--mestech-border); }
    .kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--mestech-text-muted); letter-spacing: 0.5px; }
    .kpi-value { font-size: 26px; font-weight: 800; margin-top: 4px; }
    .kpi-trend { font-size: 12px; margin-top: 4px; }
    .card-panel { background: var(--mestech-card-bg); border-radius: var(--mestech-radius); padding: 20px; box-shadow: var(--mestech-shadow-sm); border: 1px solid var(--mestech-border); margin-bottom: 20px; }
    .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .filter-bar input, .filter-bar select { border: 1px solid var(--mestech-border); border-radius: 8px; padding: 8px 12px; font-size: 13px; background: var(--mestech-card-bg); color: var(--mestech-text); }
    .btn-mestech { background: var(--mestech-primary); color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-mestech:hover { background: var(--mestech-primary-hover); color: white; }
    .btn-export { background: var(--mestech-success); color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-export:hover { opacity: 0.9; color: white; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--mestech-text-muted); padding: 12px 8px; border-bottom: 2px solid var(--mestech-border); text-align: left; }
    td { padding: 12px 8px; border-bottom: 1px solid var(--mestech-border); font-size: 13px; }
    .text-success { color: var(--mestech-success) !important; }
    .text-danger { color: var(--mestech-danger) !important; }
    .loading-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); border-radius: var(--mestech-radius); align-items: center; justify-content: center; z-index: 10; }
    .loading-overlay.active { display: flex; }
    .api-waiting { text-align: center; padding: 40px; color: var(--mestech-text-muted); }
    @media (max-width: 768px) {
      .kpi-card { margin-bottom: 12px; }
    }
    @media print {
      .sidebar, .navbar, .btn, .no-print, nav, footer { display: none !important; }
      .content, .main-content, main { width: 100% !important; margin: 0 !important; }
      body { background: white !important; color: black !important; font-size: 12pt !important; }
      .card { box-shadow: none !important; border: 1px solid #ddd !important; break-inside: avoid; }
      table { font-size: 10pt; }
    }
  </style>
</head>
<body>
  <noscript><div class="alert alert-warning text-center m-3">Bu sayfa JavaScript gerektirir. Lutfen tarayicinizda JavaScript'i etkinlestirin.</div></noscript>
  <div class="container-fluid p-4">

    <!-- Header -->
    <div class="page-header d-flex justify-content-between align-items-center">
      <div>
        <h1><i class="fas fa-chart-line me-2"></i>Kar / Zarar Raporu</h1>
        <p>Platform bazli gelir, gider ve net kar analizi</p>
      </div>
      <div class="d-flex gap-2">
        <button class="btn-export" id="btnExport" onclick="exportExcel()"><i class="fas fa-file-excel me-1"></i>Excel</button>
        <button class="btn-mestech" onclick="loadData()"><i class="fas fa-sync-alt me-1"></i>Yenile</button>
      </div>
    </div>

    <!-- KPI Cards -->
    <div class="row g-3 mb-4" id="kpiRow">
      <div class="col-xl-3 col-md-6">
        <div class="kpi-card">
          <div class="kpi-label">Toplam Gelir</div>
          <div class="kpi-value text-success" id="kpiRevenue">—</div>
          <div class="kpi-trend" id="kpiRevenueTrend"></div>
        </div>
      </div>
      <div class="col-xl-3 col-md-6">
        <div class="kpi-card">
          <div class="kpi-label">Toplam Gider</div>
          <div class="kpi-value text-danger" id="kpiExpense">—</div>
          <div class="kpi-trend" id="kpiExpenseTrend"></div>
        </div>
      </div>
      <div class="col-xl-3 col-md-6">
        <div class="kpi-card">
          <div class="kpi-label">Net Kar</div>
          <div class="kpi-value" id="kpiNetProfit" style="color: var(--mestech-info);">—</div>
          <div class="kpi-trend" id="kpiNetProfitTrend"></div>
        </div>
      </div>
      <div class="col-xl-3 col-md-6">
        <div class="kpi-card">
          <div class="kpi-label">Kar Marji</div>
          <div class="kpi-value" id="kpiMargin" style="color: var(--mestech-purple);">—</div>
          <div class="kpi-trend" id="kpiMarginTrend"></div>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="card-panel">
      <div class="filter-bar">
        <input type="date" id="filterFrom" title="Baslangic tarihi">
        <input type="date" id="filterTo" title="Bitis tarihi">
        <select id="filterPlatform" title="Platform secimi">
          <option value="">Tum Platformlar</option>
          <option value="Trendyol">Trendyol</option>
          <option value="Hepsiburada">Hepsiburada</option>
          <option value="N11">N11</option>
          <option value="Ciceksepeti">Ciceksepeti</option>
          <option value="Amazon">Amazon</option>
        </select>
        <button class="btn-mestech" onclick="loadData()"><i class="fas fa-search me-1"></i>Filtrele</button>
      </div>
    </div>

    <!-- Platform Breakdown Table -->
    <div class="card-panel position-relative">
      <h6 class="fw-bold mb-3"><i class="fas fa-layer-group me-2"></i>Platform Bazli Kirilim</h6>
      <div class="loading-overlay" id="tableLoading">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
      <div id="errorAlert" class="alert alert-danger mx-3" style="display:none;" role="alert"></div>
      <div id="tableContainer">
        <div class="api-waiting" id="apiWaiting">
          <i class="fas fa-plug fa-2x mb-2"></i>
          <p>API baglantisi bekleniyor...</p>
        </div>
        <table id="platformTable" style="display:none;">
          <thead>
            <tr>
              <th>Platform</th>
              <th>Gelir</th>
              <th>Maliyet</th>
              <th>Komisyon</th>
              <th>Kargo</th>
              <th>Net Kar</th>
              <th>Marj</th>
            </tr>
          </thead>
          <tbody id="platformBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Monthly Trend Chart -->
    <div class="card-panel">
      <h6 class="fw-bold mb-3"><i class="fas fa-chart-area me-2"></i>Aylik Trend</h6>
      <canvas id="trendChart" height="300"></canvas>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    'use strict';

    const API_BASE = '/api/v1/accounting';
    let trendChart = null;

    function formatCurrency(amount) {
      return new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY' }).format(amount);
    }

    async function loadData() {
      const loading = document.getElementById('tableLoading');
      loading.classList.add('active');

      const from = document.getElementById('filterFrom').value;
      const to = document.getElementById('filterTo').value;
      const platform = document.getElementById('filterPlatform').value;

      let url = API_BASE + '/profit-report?';
      if (from) url += 'from=' + encodeURIComponent(from) + '&';
      if (to) url += 'to=' + encodeURIComponent(to) + '&';
      if (platform) url += 'platform=' + encodeURIComponent(platform) + '&';

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('API yanit vermedi: ' + res.status);
        const data = await res.json();
        renderKPIs(data);
        renderTable(data.platforms || []);
        renderChart(data.monthly || []);
      } catch (err) {
        const el = document.getElementById('errorAlert');
        if (el) { el.textContent = 'Kar/zarar verileri yuklenemedi: ' + err.message; el.style.display = 'block'; }
      } finally {
        loading.classList.remove('active');
      }
    }

    function renderKPIs(data) {
      setText('kpiRevenue', formatCurrency(data.totalRevenue || 0));
      setText('kpiExpense', formatCurrency(data.totalExpenses || 0));
      setText('kpiNetProfit', formatCurrency(data.netProfit || 0));
      setText('kpiMargin', '%' + ((data.profitMargin || 0).toFixed(1)));
    }

    function renderTable(platforms) {
      const tbody = document.getElementById('platformBody');
      const table = document.getElementById('platformTable');
      const waiting = document.getElementById('apiWaiting');

      tbody.textContent = '';

      if (platforms.length === 0) {
        waiting.style.display = 'block';
        table.style.display = 'none';
        return;
      }

      waiting.style.display = 'none';
      table.style.display = 'table';

      for (const p of platforms) {
        const tr = document.createElement('tr');
        const cells = [
          p.platform,
          formatCurrency(p.revenue),
          formatCurrency(p.cost),
          formatCurrency(p.commission),
          formatCurrency(p.shipping),
          formatCurrency(p.netProfit),
          '%' + (p.margin || 0).toFixed(1)
        ];
        for (const text of cells) {
          const td = document.createElement('td');
          td.textContent = text;
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
    }

    function renderChart(monthly) {
      const ctx = document.getElementById('trendChart').getContext('2d');
      if (trendChart) trendChart.destroy();

      const labels = monthly.map(m => m.month);
      trendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            { label: 'Gelir', data: monthly.map(m => m.revenue), borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.3 },
            { label: 'Gider', data: monthly.map(m => m.expenses), borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', fill: true, tension: 0.3 },
            { label: 'Net Kar', data: monthly.map(m => m.netProfit), borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.3 }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: 'top' } },
          scales: { y: { beginAtZero: true, ticks: { callback: v => formatCurrency(v) } } }
        }
      });
    }

    /* renderDemoData removed — real API only (HA-01) */

    function setText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }

    function exportExcel() {
      const from = document.getElementById('filterFrom').value;
      const to = document.getElementById('filterTo').value;
      window.open(API_BASE + '/profit-report/export?from=' + encodeURIComponent(from || '') + '&to=' + encodeURIComponent(to || '') + '&format=xlsx');
    }

    // Set default dates
    const now = new Date();
    document.getElementById('filterTo').value = now.toISOString().split('T')[0];
    document.getElementById('filterFrom').value = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];

    loadData();
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</body>
</html>
