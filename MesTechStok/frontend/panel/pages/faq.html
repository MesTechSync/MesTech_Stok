    const faqData = [
      // GENEL (5)
      { cat: 'genel', q: 'MesTech nedir?', a: 'MesTech, coklu pazaryeri stok ve siparis yonetimi platformudur. Trendyol, Hepsiburada, N11, Amazon ve diger pazaryerlerini tek bir panelden yonetmenizi saglar.' },
      { cat: 'genel', q: 'Hangi platformlarda kullanabilirim?', a: 'MesTech 4 farkli arayuz sunar: WPF (Windows masaustu), Avalonia (cross-platform masaustu), Blazor (web/PWA) ve HTML Panel (tarayici). Ihtiyaciniza uygun olani secebilirsiniz.' },
      { cat: 'genel', q: 'Ucretsiz deneme sureci var mi?', a: 'Evet. 14 gunluk ucretsiz deneme surecinde tum ozelliklere erisebilirsiniz. Kredi karti bilgisi gerekmez.' },
      { cat: 'genel', q: 'Destek ekibine nasil ulasabilirim?', a: 'destek@mestech.tr adresine e-posta gonderebilir, canli destek butonunu kullanabilir veya SSS sayfamizi inceleyebilirsiniz. Yanit suresi genellikle 2 saat icerisindedir.' },
      { cat: 'genel', q: 'MesTech guncellemeleri nasil yapilir?', a: 'Web paneli otomatik guncellenir. Masaustu uygulamalari icin guncelleme bildirimi alirsiniz. Degisiklik Gunlugu sayfasindan yenilikleri takip edebilirsiniz.' },

      // URUN YONETIMI (5)
      { cat: 'urun', q: 'Toplu urun yukleme nasil yapilir?', a: 'Urunler > Toplu Islem sayfasindan Excel sablonunu indirin, urunlerinizi doldurun ve sisteme yukleyin. Sistem hatalari otomatik tespit eder ve rapor sunar.' },
      { cat: 'urun', q: 'Urun varyantlari nasil tanimlaniyor?', a: 'Urun duzenleme sayfasinda "Varyant Ekle" bolumunden beden, renk veya model gibi varyantlar tanimlayabilirsiniz. Her varyant icin ayri stok, fiyat ve barkod belirlenebilir.' },
      { cat: 'urun', q: 'Urun gorsel siniri ne kadar?', a: 'Her urun icin en az 1, en fazla 8 gorsel yukleyebilirsiniz. Gorseller otomatik optimize edilir. Minimum 1000x1000 piksel cozunurluk onerilir.' },
      { cat: 'urun', q: 'SKU ve barkod zorunlu mu?', a: 'SKU zorunludur ve her urun icin benzersiz olmalidir. Barkod zorunlu degildir ancak kargo ve depo yonetimi icin onerilir.' },
      { cat: 'urun', q: 'Urun aciklamasini AI ile olusturabilir miyim?', a: 'Evet. Urun duzenleme sayfasinda "AI ile Olustur" butonuyla SEO uyumlu baslik ve aciklama otomatik uretebilirsiniz.' },

      // STOK (5)
      { cat: 'stok', q: 'Minimum stok seviyesi nasil belirlenir?', a: 'Urun detay sayfasinda "Stok Ayarlari" bolumunden minimum stok degerini girebilirsiniz. Bu seviye altina dustugunde otomatik uyari alinir.' },
      { cat: 'stok', q: 'Stok hareketleri nasil takip ediliyor?', a: 'Her stok degisikligi (giris, cikis, duzeltme) otomatik loglanir. Urun detayinda "Stok Hareketleri" sekmesinden tum gecmisi gorebilirsiniz.' },
      { cat: 'stok', q: 'Coklu depo yonetimi yapabilir miyim?', a: 'Evet. Birden fazla depo tanimlayarak her depodaki stogunuzu ayri takip edebilirsiniz. Depo arasi transfer islemi de desteklenir.' },
      { cat: 'stok', q: 'Stok senkronizasyonu nasil calisir?', a: 'Tum pazaryerlerindeki stok miktarlari MesTech uzerinden merkezi olarak yonetilir. Bir satista stok otomatik tum platformlarda guncellenir.' },
      { cat: 'stok', q: 'Stok sayimi nasil yapilir?', a: 'Stok > Sayim sayfasindan yeni sayim baslatin. Fiziksel saydigi miktarlari girin, sistem otomatik farklari hesaplar ve duzeltme kaydini olusturur.' },

      // SIPARISLER (5)
      { cat: 'siparis', q: 'Siparisler ne siklikla guncellenir?', a: 'Siparisler varsayilan olarak her 5 dakikada bir pazaryerlerinden cekilir. Webhook destekleyen platformlarda anlik guncelleme yapilir.' },
      { cat: 'siparis', q: 'Toplu siparis onaylama yapabilir miyim?', a: 'Evet. Siparis listesinde birden fazla siparis secip toplu onaylama, toplu kargo etiketi basimi ve toplu fatura olusturma yapabilirsiniz.' },
      { cat: 'siparis', q: 'Siparis iptali nasil yapilir?', a: 'Siparis detay sayfasinda "Iptal Et" butonuna tiklayin. Iptal nedeni secin ve onaylayin. Stok otomatik olarak geri eklenir.' },
      { cat: 'siparis', q: 'Iade sureci nasil isleniyor?', a: 'Iade talepleri pazaryerinden otomatik cekilir. Iade nedenini inceleyin, onaylayin veya reddedin. Onaylanan iadelerde stok otomatik geri eklenir.' },
      { cat: 'siparis', q: 'Siparis raporu indirebilir miyim?', a: 'Evet. Siparisler sayfasindan sectiginiz tarih araligina ait raporu Excel, CSV veya PDF olarak indirebilirsiniz.' },

      // PAZARYERI (5)
      { cat: 'pazaryeri', q: 'Hangi pazaryerlerini destekliyorsunuz?', a: '12 pazaryeri desteklenmektedir: Trendyol, Hepsiburada, N11, Ciceksepeti, Pazarama, Amazon, eBay, Shopify, WooCommerce, Ozon, PttAVM ve OpenCart.' },
      { cat: 'pazaryeri', q: 'API baglantisi nasil kurulur?', a: 'Ayarlar > Pazaryerleri sayfasindan platformu secin, API bilgilerini girin ve "Baglanti Testi" butonuyla dogrulayin.' },
      { cat: 'pazaryeri', q: 'Platform bazli fiyat belirleyebilir miyim?', a: 'Evet. Urun detayinda "Platform Fiyatlari" sekmesinden her platform icin ayri satis fiyati belirleyebilirsiniz.' },
      { cat: 'pazaryeri', q: 'Kategori eslestirme nasil calisir?', a: 'MesTech akilli kategori eslestirme onerisi sunar. Urunler > Kategori Eslestirme sayfasindan her platform icin uygun kategoriyi secin.' },
      { cat: 'pazaryeri', q: 'Yeni pazaryeri eklenecek mi?', a: 'Evet. Yol haritamizda Etsy, Zalando ve ek uluslararasi pazaryerleri bulunmaktadir. Yenilikler icin changelog sayfasini takip edin.' },

      // FATURA (5)
      { cat: 'fatura', q: 'E-fatura entegrasyonu nasil yapilir?', a: 'Ayarlar > Fatura sayfasindan Sovos veya GIB Portal saglayicisini secin, API bilgilerini girin ve baglanti testini yapin. UBL-TR 1.2 formati desteklenir.' },
      { cat: 'fatura', q: 'Otomatik fatura kesimi nedir?', a: 'Siparis belirli bir asamaya geldiginde (ornegin kargoya verildi) otomatik e-fatura kesilir. Bireysel icin e-arsiv, kurumsal icin e-fatura secilir.' },
      { cat: 'fatura', q: 'KDV orani nasil belirleniyor?', a: 'Urun kategorisine gore varsayilan KDV orani otomatik uygulanir (%1, %10, %20). Ihtiyac halinde urun veya fatura bazinda manuel degistirilebilir.' },
      { cat: 'fatura', q: 'Fatura PDF olarak indirilebilir mi?', a: 'Evet. Fatura arsivinden herhangi bir faturayi PDF olarak indirebilir veya e-posta ile gonderebilirsiniz.' },
      { cat: 'fatura', q: 'E-fatura mukellefiyetim yoksa ne yapmaliyim?', a: 'E-fatura mukellefiyetiniz yoksa e-arsiv fatura kesebilirsiniz. Ayni entegrasyon adimlarini izleyebilirsiniz. Durumunuzu GIB Portal\'dan kontrol edin.' },

      { cat: 'kargo', q: 'Kargo takip numarasi otomatik olusturulur mu?', a: 'Evet. Kargo firmasi entegrasyonu aktifken gonderi olusturulduğunda takip numarasi otomatik alinir ve pazaryerine bildirilir.' },
      { cat: 'kargo', q: 'Desi hesaplama nasil yapilir?', a: 'Urun boyutlarini (en x boy x yukseklik) girdiginizde desi otomatik hesaplanir. Kargo ucreti agirlik ve desi degerinden buyuk olana gore belirlenir.' },
      { cat: 'kargo', q: 'Birden fazla kargo firmasiyla calısabilir miyim?', a: 'Evet. Birden fazla kargo firmasi ekleyebilirsiniz. Siparis bazinda en uygun kargoyu secebilir veya varsayilan firmayı belirleyebilirsiniz.' },

      // RAPORLAR (5)
      { cat: 'rapor', q: 'Hangi rapor turleri mevcut?', a: 'Satis raporu, stok raporu, kar-zarar raporu, platform analizi, kategori performansi, kargo analizi ve muhasebe raporlari mevcuttur.' },
      { cat: 'rapor', q: 'Rapor hangi formatlarda indirilebilir?', a: '6 farkli format desteklenir: Excel (.xlsx), CSV, PDF, JSON, XML ve HTML. Her rapor sayfasinda indirme butonlari mevcuttur.' },
      { cat: 'rapor', q: 'Zamanli rapor gonderimi yapabilir miyim?', a: 'Evet. Rapor sablonu olusturup gunluk, haftalik veya aylik olarak e-posta ile otomatik gonderim tanimlayabilirsiniz.' },

      // TEKNIK (5)
      { cat: 'teknik', q: 'Sistem gereksinimleri nelerdir?', a: 'Web paneli icin modern tarayici (Chrome, Firefox, Edge) yeterlidir. Masaustu uygulamasi icin Windows 10+ ve .NET 9.0 Runtime gereklidir.' },
      { cat: 'teknik', q: 'API dokumantasyonu nerede?', a: 'Swagger dokumantasyonuna /api/swagger adresinden ulasabilirsiniz. JWT token ile kimlik dogrulama yapilir.' },
      { cat: 'teknik', q: 'Veritabani yedekleme nasil yapilir?', a: 'Otomatik gunluk yedekleme aktiftir. Manuel yedekleme icin Ayarlar > Yedekleme sayfasini kullanin. Yedekler MinIO nesne depolamada saklanir.' },
      { cat: 'teknik', q: 'Hata loglarina nasil ulasabilirim?', a: 'Seq log yonetim aracina port 8080\'den ulasabilirsiniz. Tum uygulama loglari yapilandirilmis formatta goruntulenir.' },
      { cat: 'teknik', q: 'Webhook desteginiz var mi?', a: 'Evet. Siparis, stok ve fatura olaylari icin webhook endpoint\'leri tanimlanabilir. Ayarlar > Webhook sayfasindan URL ve olaylari yapilandirin.' },

      // GUVENLIK (5)
      { cat: 'guvenlik', q: 'Verilerim guvenli mi?', a: 'Evet. Tum veriler SSL/TLS ile sifrelenir, PostgreSQL veritabaninda saklanir ve gunluk yedekleme alinir. API anahtarlari BCrypt ile hashlenir.' },
      { cat: 'guvenlik', q: 'Iki faktorlu dogrulama (2FA) var mi?', a: 'Evet. Ayarlar > Guvenlik sayfasindan 2FA\'yi aktif edebilirsiniz. TOTP uyumlu uygulamalar (Google Authenticator, Authy) desteklenir.' },
      { cat: 'guvenlik', q: 'Sifre politikasi nasil yapilandirilir?', a: 'Ayarlar > Guvenlik sayfasindan minimum sifre uzunlugu, buyuk harf, sayi ve ozel karakter gereksinimleri ayarlanabilir.' },
      { cat: 'guvenlik', q: 'KVKK uyumlulugu sagliyor musunuz?', a: 'Evet. Denetim kayitlari silinemez, kullanici verileri sifrelenir, veri isleme ve silme politikalari KVKK gereksinimlerine uygun tasarlanmistir.' },
      { cat: 'guvenlik', q: 'IP kisitlama yapabilir miyim?', a: 'Evet. Ayarlar > Guvenlik > IP Kisitlama bolumunden belirli IP adresleri veya IP araliklari ile erisimi sinirlandirabilirsiniz.' }
    ];

    // ========================================
    // DOM Helper
    // ========================================
    function el(tag, attrs, children) {
      const node = document.createElement(tag);
      if (attrs) {
        Object.keys(attrs).forEach(function(key) {
          if (key === 'className') node.className = attrs[key];
          else if (key === 'textContent') node.textContent = attrs[key];
          else node.setAttribute(key, attrs[key]);
        });
      }
      if (children) {
        if (!Array.isArray(children)) children = [children];
        children.forEach(function(child) {
          if (typeof child === 'string') node.appendChild(document.createTextNode(child));
          else if (child instanceof Node) node.appendChild(child);
        });
      }
      return node;
    }

    function clearChildren(parent) {
      while (parent.firstChild) parent.removeChild(parent.firstChild);
    }

    // ========================================
    // Active category filter
    // ========================================
    let activeCategory = 'all';

    // ========================================
    // Render Category Tabs (DOM-SAFE)
    // ========================================
    function renderTabs() {
      const container = document.getElementById('category-tabs');
      clearChildren(container);

      const nav = el('ul', { className: 'nav nav-pills flex-nowrap' });

      // "All" tab
      const allLi = el('li', { className: 'nav-item' });
      const allLink = el('button', {
        className: 'nav-link active',
        type: 'button',
        'data-category': 'all',
        textContent: 'Tumu (50)',
        'data-i18n': 'faq.tab.all'
      });
      allLink.addEventListener('click', function() { filterByCategory('all'); });
      allLi.appendChild(allLink);
      nav.appendChild(allLi);

      categories.forEach(function(cat) {
        const count = faqData.filter(function(f) { return f.cat === cat.id; }).length;
        const li = el('li', { className: 'nav-item' });
        const link = el('button', {
          className: 'nav-link',
          type: 'button',
          'data-category': cat.id,
          textContent: cat.title + ' (' + count + ')',
          'data-i18n': 'faq.tab.' + cat.id
        });
        link.addEventListener('click', function() { filterByCategory(cat.id); });
        li.appendChild(link);
        nav.appendChild(li);
      });

      container.appendChild(nav);
    }

    function filterByCategory(catId) {
      activeCategory = catId;

      // Update tab active state
      const tabs = document.querySelectorAll('.category-tabs .nav-link');
      tabs.forEach(function(tab) {
        if (tab.getAttribute('data-category') === catId) {
          tab.classList.add('active');
        } else {
          tab.classList.remove('active');
        }
      });

      // Show/hide categories
      const sections = document.querySelectorAll('.faq-category');
      sections.forEach(function(section) {
        if (catId === 'all' || section.getAttribute('data-category') === catId) {
          section.classList.remove('hidden');
        } else {
          section.classList.add('hidden');
        }
      });

      // Clear search when switching tabs
      const input = document.getElementById('faq-search-input');
      if (input) input.value = '';
      const resultCount = document.getElementById('result-count');
      if (resultCount) resultCount.textContent = '';
      const noResults = document.getElementById('no-results');
      if (noResults) noResults.style.display = 'none';

      // Show all items within visible categories
      const items = document.querySelectorAll('.faq-item');
      items.forEach(function(item) { item.classList.remove('hidden'); });
    }

    // ========================================
    // Render FAQ (DOM-SAFE)
    // ========================================
    function renderFaq() {
      const container = document.getElementById('faq-content');
      clearChildren(container);

      let globalIndex = 0;

      categories.forEach(function(cat) {
        const items = faqData.filter(function(f) { return f.cat === cat.id; });
        if (items.length === 0) return;

        const section = el('div', { className: 'faq-category', 'data-category': cat.id });

        // Category header
        const header = el('div', { className: 'faq-category-header' });
        const iconEl = el('div', { className: 'cat-icon' });
        iconEl.style.background = cat.bg;
        iconEl.style.color = cat.color;
        iconEl.appendChild(el('i', { className: cat.icon }));
        header.appendChild(iconEl);
        header.appendChild(el('h5', { textContent: cat.title, 'data-i18n': 'faq.cat.' + cat.id }));
        header.appendChild(el('span', { className: 'cat-count', textContent: items.length + ' soru' }));
        section.appendChild(header);

        // Accordion
        const accordion = el('div', { className: 'accordion', id: 'accordion-' + cat.id });

        items.forEach(function(item) {
          globalIndex++;
          const itemId = 'faq-item-' + globalIndex;

          const accItem = el('div', {
            className: 'accordion-item faq-item',
            'data-search': (item.q + ' ' + item.a).toLowerCase()
          });

          const accHeader = el('h2', { className: 'accordion-header' });
          const accButton = el('button', {
            className: 'accordion-button collapsed',
            type: 'button',
            'data-bs-toggle': 'collapse',
            'data-bs-target': '#' + itemId,
            'aria-expanded': 'false',
            'aria-controls': itemId
          });
          accButton.appendChild(document.createTextNode(item.q));
          accHeader.appendChild(accButton);
          accItem.appendChild(accHeader);

          const accCollapse = el('div', {
            className: 'accordion-collapse collapse',
            id: itemId,
            'data-bs-parent': '#accordion-' + cat.id
          });
          const accBody = el('div', { className: 'accordion-body', textContent: item.a });
          accCollapse.appendChild(accBody);
          accItem.appendChild(accCollapse);

          accordion.appendChild(accItem);
        });

        section.appendChild(accordion);
        container.appendChild(section);
      });
    }

    // ========================================
    // Search / Filter
    // ========================================
    function initSearch() {
      const input = document.getElementById('faq-search-input');
      const resultCount = document.getElementById('result-count');
      const noResults = document.getElementById('no-results');
      if (!input) return;

      input.addEventListener('input', function() {
        const query = input.value.toLowerCase().trim();
        const faqItems = document.querySelectorAll('.faq-item');
        let visible = 0;

        faqItems.forEach(function(item) {
          const searchData = item.getAttribute('data-search') || '';
          // Also check if parent category is visible (tab filter)
          const parentCat = item.closest('.faq-category');
          let catVisible = !parentCat.classList.contains('hidden') || activeCategory === 'all';

          if (activeCategory !== 'all') {
            const catId = parentCat.getAttribute('data-category');
            catVisible = catId === activeCategory;
          }

          if (catVisible && (!query || searchData.indexOf(query) !== -1)) {
            item.classList.remove('hidden');
            visible++;
          } else {
            item.classList.add('hidden');
          }
        });

        // Show/hide category headers if all items hidden
        const cats = document.querySelectorAll('.faq-category');
        cats.forEach(function(cat) {
          const catId = cat.getAttribute('data-category');
          if (activeCategory !== 'all' && catId !== activeCategory) {
            cat.classList.add('hidden');
            return;
          }
          const visibleItems = cat.querySelectorAll('.faq-item:not(.hidden)');
          if (visibleItems.length === 0) {
            cat.classList.add('hidden');
          } else {
            cat.classList.remove('hidden');
          }
        });

        if (query) {
          resultCount.textContent = visible + ' sonuc bulundu';
        } else {
          resultCount.textContent = '';
        }

        if (query && visible === 0) {
          noResults.style.display = 'block';
        } else {
          noResults.style.display = 'none';
        }
      });
    }

    // ========================================
    // Init
    // ========================================
    function init() {
      renderTabs();
      renderFaq();
      initSearch();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else { init(); }

  })();
  </script>
</body>
