# MesTech Stok - Staging Override
# Kullanim: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#
# Production'dan farklari:
#   1. DB portlari host'a ACIK (debug/test icin)
#   2. ASPNETCORE_ENVIRONMENT=Staging
#   3. Seq UI disariya ACIK (test log inceleme)
#   4. Daha dusuk kaynak limitleri
#   5. Tum credential'lar .env'den — CHANGE_ME default YOK

services:
  postgres:
    cpus: 1.0
    pids_limit: 100
    ports:
      - "${PG_HOST_PORT:-3432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER zorunlu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD zorunlu}
      POSTGRES_DB: ${PG_DATABASE:?PG_DATABASE zorunlu}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    cpus: 0.5
    pids_limit: 50
    ports:
      - "${REDIS_HOST_PORT:-3679}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD zorunlu}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel notice
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  rabbitmq:
    cpus: 0.5
    pids_limit: 100
    ports:
      - "${AMQP_HOST_PORT:-3672}:5672"
      - "${RMQ_MGMT_PORT:-3692}:15672"
      - "15692"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER zorunlu}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD zorunlu}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  mysql:
    cpus: 0.5
    pids_limit: 100
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD zorunlu}
      MYSQL_DATABASE: opencart_stok
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  seq:
    cpus: 0.5
    pids_limit: 50
    ports:
      - "5341"
      - "${SEQ_UI_PORT:-3580}:80"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "${SEQ_ADMIN_PASSWORD:?SEQ_ADMIN_PASSWORD zorunlu}"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  webapi:
    cpus: 1.0
    pids_limit: 100
    ports:
      - "${WEBAPI_PORT:-3100}:3100"
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${PG_DATABASE:?PG_DATABASE zorunlu};Username=${POSTGRES_USER:?POSTGRES_USER zorunlu};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD zorunlu}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:?REDIS_PASSWORD zorunlu}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER:?RABBITMQ_USER zorunlu}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD zorunlu}"
      Seq__ServerUrl: "http://seq:5341"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  blazor:
    cpus: 0.5
    pids_limit: 100
    ports:
      - "${BLAZOR_PORT:-3200}:3200"
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${PG_DATABASE:?PG_DATABASE zorunlu};Username=${POSTGRES_USER:?POSTGRES_USER zorunlu};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD zorunlu}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:?REDIS_PASSWORD zorunlu}"
      Seq__ServerUrl: "http://seq:5341"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3200/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  minio:
    cpus: 0.5
    pids_limit: 50
    ports:
      - "${MINIO_API_PORT:-3900}:9000"
      - "${MINIO_CONSOLE_PORT:-3901}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER zorunlu}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD zorunlu}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
