# MesTech Stok - PostgreSQL 17 + pgvector + Redis + RabbitMQ
# Kullanım: docker compose up -d
#
# PORT HARÍTASI (çakışma önleme — AI Asistan & yerel Redis dikkate alındı):
#   PostgreSQL → 3432:5432  (AI Asistan: 5532, yerel PG yok, 5432 boş ama güvenlik amaçlı 3xxx)
#   Redis      → 3679:6379  (Yerel Redis PID 3920 @ 6379, AI Asistan: 5379)
#   RabbitMQ   → 3672:5672, 3692:15672, 3693:15692  (AI Asistan: 5672, 15672)
#   MySQL      → 3306:3306  (çakışma yok)
#   Seq        → 3341:80 (dashboard), 3343:5341 (ingestion) — ana repo ile uyumlu (CLAUDE.md port tablosu)
#   MinIO      → 3900:9000, 3901:9001  (çakışma yok ama tutarlılık)
#
# DEMİR KURAL: Container-arası iletişim Docker network üzerinden standart portlarla yapılır.
#              Sadece HOST mapping değişir.

services:
  postgres:
    image: pgvector/pgvector:pg17@sha256:4d015894147ed169e4d2b2e14505cb99333c868e75663f586c217ba786c800d1
    container_name: mestech-postgres
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0
    pids_limit: 200
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      POSTGRES_USER: ${PG_USER:-mestech_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD zorunlu - .env dosyasini olusturun}
      POSTGRES_DB: ${PG_DATABASE:-mestech_stok}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${PG_PORT:-3432}:5432"
    volumes:
      - mestech_pgdata:/var/lib/postgresql/data
      - ./Scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-mestech_user} -d ${PG_DATABASE:-mestech_stok}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mestech-backend

  redis:
    image: redis:7.4-alpine@sha256:4bfd9eca23339865dc14fe75f6d9ae643f714924623978dd2798f1a673b08f43
    container_name: mestech-redis
    restart: unless-stopped
    user: "999:999"
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 100
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD zorunlu - .env dosyasini olusturun}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --loglevel warning
    ports:
      - "${REDIS_PORT:-3679}:6379"
    volumes:
      - mestech_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD zorunlu}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks:
      - mestech-backend

  rabbitmq:
    image: rabbitmq:3.13-management-alpine@sha256:3c498e636fd64462480c5f9ff842eb224ab84160a8ada1ded5375e9569e9230c
    container_name: mestech-rabbitmq
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 150
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp
      - /var/log/rabbitmq
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER zorunlu - .env dosyasini olusturun}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD zorunlu - .env dosyasini olusturun}
      RABBITMQ_PLUGINS: "rabbitmq_management,rabbitmq_prometheus"
    ports:
      - "3672:5672"
      - "3692:15672"
      - "3693:15692"
    volumes:
      - mestech_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mestech-backend

  mysql:
    image: mysql:8.0@sha256:ce4d5c5f9df534fb059e6826805ad7dc3cb431589d4d99cc0869f5ee766e0f47
    container_name: mestech-mysql
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 150
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/mysqld
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD zorunlu - .env dosyasini olusturun}
      MYSQL_DATABASE: opencart_stok
    ports:
      - "3306:3306"
    volumes:
      - mestech_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mestech-backend

  seq:
    image: datalust/seq:2024.1@sha256:95b41ddda7bc31825bc9f7ba9331aab6daec13524c2992601c0ddd53129ad43c
    container_name: mestech-seq
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 100
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "${SEQ_ADMIN_PASSWORD:?SEQ_ADMIN_PASSWORD zorunlu - .env dosyasini olusturun}"
    ports:
      - "3341:80"
      - "3343:5341"
    volumes:
      - mestech_seq_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - mestech-backend
      - mestech-monitoring

  # ─────────────────────────────────────────
  # MesTech WebAPI — .NET 9.0 (Dalga 14+)
  # ─────────────────────────────────────────
  webapi:
    build:
      context: ../..
      dockerfile: MesTech_Stok/MesTechStok/src/MesTech.WebApi/Dockerfile
    container_name: mestech-webapi
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 150
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${WEBAPI_PORT:-3100}:3100"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=mestech_stok;Username=mestech_user;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD zorunlu}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:?REDIS_PASSWORD zorunlu}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER:?RABBITMQ_USER zorunlu}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD zorunlu}"
      Seq__ServerUrl: "http://seq:5341"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mestech-backend
      - mestech-monitoring

  # ─────────────────────────────────────────
  # MesTech Blazor — .NET 9.0 SaaS Frontend (Dalga 14+)
  # ─────────────────────────────────────────
  blazor:
    build:
      context: ../..
      dockerfile: MesTech_Stok/MesTechStok/src/MesTech.Blazor/Dockerfile
    container_name: mestech-blazor
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 150
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${BLAZOR_PORT:-3200}:3200"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=mestech_stok;Username=mestech_user;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD zorunlu}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:?REDIS_PASSWORD zorunlu}"
      Seq__ServerUrl: "http://seq:5341"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      webapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mestech-frontend
      - mestech-backend

  # ─────────────────────────────────────────
  # MinIO — Belge Depolama (Dalga 8)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z@sha256:46b3009bf7041eefbd90bd0d2b38c6ddc24d20a35d609551a1802c558c1c958f
    container_name: mestech-minio
    user: "1000:1000"
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 100
    # security_opt: provided by storage/docker-compose.minio.yml (array merge causes duplicate in unified)
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: server /data --console-address ":9001"
    ports:
      - "3900:9000"    # S3 API
      - "3901:9001"    # MinIO Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER zorunlu - .env dosyasini olusturun}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD zorunlu - .env dosyasini olusturun}
    volumes:
      - minio_data:/data
    networks:
      - mestech-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Nginx — Reverse Proxy (SSL hazırlık)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.27.4-alpine@sha256:4ff102c5d78d254a6f0da062b3cf39eaf07f01eec0927fd21e219d0af8bc0591
    container_name: mestech-nginx
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 100
    # security_opt: provided by nginx/docker-compose.nginx.yml (array merge causes duplicate in unified)
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${NGINX_HTTP_PORT:-3080}:80"
      - "${NGINX_HTTPS_PORT:-3443}:443"
    volumes:
      - ../../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      webapi:
        condition: service_healthy
      blazor:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mestech-frontend
      - mestech-backend

  # ─────────────────────────────────────────
  # Prometheus — Monitoring (Dalga 14+)
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0@sha256:b8e8cec4bfdfda676f4334f4f2aab9d8758f51d76ac41fc35224f6ae79b79f54
    container_name: mestech-prometheus
    restart: unless-stopped
    user: "65534:65534"
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 100
    # security_opt: provided by monitoring/docker-compose.monitoring.yml (array merge causes duplicate in unified)
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${PROMETHEUS_PORT:-3090}:9090"
    volumes:
      - ../../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - mestech_prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.external-url=/prometheus/"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - mestech-monitoring
      - mestech-backend

  # ─────────────────────────────────────────
  # Grafana — Dashboard UI (Dalga 14+)
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:12.4.1@sha256:fab4d86718ecf6aec45961ae01c5f743a955e11fad0adb8f43c5f52a961b5144
    container_name: mestech-grafana
    restart: unless-stopped
    user: "472:0"
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 100
    # security_opt: provided by monitoring/docker-compose.monitoring.yml (array merge causes duplicate in unified)
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/log/grafana
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD zorunlu - .env dosyasini olusturun}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - mestech_grafana_data:/var/lib/grafana
      - ../../monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ../../monitoring/grafana-alerts.yml:/etc/grafana/provisioning/alerting/alerts.yml:ro
      - ../../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - mestech-monitoring

volumes:
  mestech_pgdata:
    driver: local
  mestech_redis_data:
    driver: local
  mestech_rabbitmq_data:
    driver: local
  mestech_mysql_data:
    driver: local
  mestech_seq_data:
    driver: local
  minio_data:
    driver: local
  mestech_prometheus_data:
    driver: local
  mestech_grafana_data:
    driver: local

networks:
  mestech-frontend:
    name: mestech-frontend
    driver: bridge
  mestech-backend:
    name: mestech-backend
    driver: bridge
  mestech-monitoring:
    name: mestech-monitoring
    driver: bridge
