# MesTech Stok - PostgreSQL 17 + pgvector + Redis + RabbitMQ
# Kullanım: docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mestech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mestech_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD zorunlu - .env dosyasini olusturun}
      POSTGRES_DB: mestech_stok
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - mestech_pgdata:/var/lib/postgresql/data
      - ./Scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mestech_user -d mestech_stok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mestech-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - mestech_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mestech-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER zorunlu - .env dosyasini olusturun}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD zorunlu - .env dosyasini olusturun}
      RABBITMQ_PLUGINS: "rabbitmq_management,rabbitmq_prometheus"
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - mestech_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: mestech-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD zorunlu - .env dosyasini olusturun}
      MYSQL_DATABASE: opencart_stok
    ports:
      - "3306:3306"
    volumes:
      - mestech_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: mestech-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "${SEQ_ADMIN_PASSWORD:?SEQ_ADMIN_PASSWORD zorunlu - .env dosyasini olusturun}"
    ports:
      - "5341:5341"
      - "8080:80"
    volumes:
      - mestech_seq_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────
  # MinIO — Belge Depolama (Dalga 8)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: mestech_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"    # S3 API — SABİT, değiştirme
      - "9001:9001"    # MinIO Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mestech_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_minio_password}
    volumes:
      - minio_data:/data
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  mestech_pgdata:
    driver: local
  mestech_redis_data:
    driver: local
  mestech_rabbitmq_data:
    driver: local
  mestech_mysql_data:
    driver: local
  mestech_seq_data:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: mestech-network
    external: true
