# MesTech Stok - PostgreSQL 17 + pgvector + Redis + RabbitMQ
# Kullanım: docker compose up -d
#
# PORT HARÍTASI (çakışma önleme — AI Asistan & yerel Redis dikkate alındı):
#   PostgreSQL → 3432:5432  (AI Asistan: 5532, yerel PG yok, 5432 boş ama güvenlik amaçlı 3xxx)
#   Redis      → 3679:6379  (Yerel Redis PID 3920 @ 6379, AI Asistan: 5379)
#   RabbitMQ   → 3672:5672, 3692:15672, 3693:15692  (AI Asistan: 5672, 15672)
#   MySQL      → 3306:3306  (çakışma yok)
#   Seq        → 3341:5341, 3080:80  (5341 boş ama tutarlılık için 3xxx, 8080 potansiyel çakışma)
#   MinIO      → 3900:9000, 3901:9001  (çakışma yok ama tutarlılık)
#
# DEMİR KURAL: Container-arası iletişim Docker network üzerinden standart portlarla yapılır.
#              Sadece HOST mapping değişir.

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mestech-postgres
    restart: unless-stopped
    mem_limit: 1g
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: mestech_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD zorunlu - .env dosyasini olusturun}
      POSTGRES_DB: mestech_stok
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "3432:5432"
    volumes:
      - mestech_pgdata:/var/lib/postgresql/data
      - ./Scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mestech_user -d mestech_stok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: mestech-redis
    restart: unless-stopped
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-mestech_redis_dev}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "3679:6379"
    volumes:
      - mestech_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mestech_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: mestech-rabbitmq
    restart: unless-stopped
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER zorunlu - .env dosyasini olusturun}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD zorunlu - .env dosyasini olusturun}
      RABBITMQ_PLUGINS: "rabbitmq_management,rabbitmq_prometheus"
    ports:
      - "3672:5672"
      - "3692:15672"
      - "3693:15692"
    volumes:
      - mestech_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: mestech-mysql
    restart: unless-stopped
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD zorunlu - .env dosyasini olusturun}
      MYSQL_DATABASE: opencart_stok
    ports:
      - "3306:3306"
    volumes:
      - mestech_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:2024.1
    container_name: mestech-seq
    restart: unless-stopped
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "${SEQ_ADMIN_PASSWORD:?SEQ_ADMIN_PASSWORD zorunlu - .env dosyasini olusturun}"
    ports:
      - "3341:5341"
      - "3580:80"
    volumes:
      - mestech_seq_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────
  # MesTech WebAPI — .NET 9.0 (Dalga 14+)
  # ─────────────────────────────────────────
  webapi:
    build:
      context: ../..
      dockerfile: MesTech_Stok/MesTechStok/src/MesTech.WebApi/Dockerfile
    container_name: mestech-webapi
    restart: unless-stopped
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "5100:5100"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=mestech_stok;Username=mestech_user;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD zorunlu}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-mestech_redis_dev}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER:?RABBITMQ_USER zorunlu}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD zorunlu}"
      Seq__ServerUrl: "http://seq:5341"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5100/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────
  # MinIO — Belge Depolama (Dalga 8)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: mestech-minio
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: server /data --console-address ":9001"
    ports:
      - "3900:9000"    # S3 API
      - "3901:9001"    # MinIO Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mestech}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-mestech_minio_dev}
    volumes:
      - minio_data:/data
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  mestech_pgdata:
    driver: local
  mestech_redis_data:
    driver: local
  mestech_rabbitmq_data:
    driver: local
  mestech_mysql_data:
    driver: local
  mestech_seq_data:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: mestech-network
    driver: bridge
