# MesTech Stok - PostgreSQL 17 + pgvector + Redis + RabbitMQ
# Kullanım: docker compose up -d
#
# PORT HARÍTASI (çakışma önleme — AI Asistan & yerel Redis dikkate alındı):
#   PostgreSQL → 3432:5432  (AI Asistan: 5532, yerel PG yok, 5432 boş ama güvenlik amaçlı 3xxx)
#   Redis      → 3679:6379  (Yerel Redis PID 3920 @ 6379, AI Asistan: 5379)
#   RabbitMQ   → 3672:5672, 3692:15672, 3693:15692  (AI Asistan: 5672, 15672)
#   MySQL      → 3306:3306  (çakışma yok)
#   Seq        → 3341:5341, 3580:80  (5341 boş ama tutarlılık için 3xxx, 8080 potansiyel çakışma)
#   MinIO      → 3900:9000, 3901:9001  (çakışma yok ama tutarlılık)
#
# DEMİR KURAL: Container-arası iletişim Docker network üzerinden standart portlarla yapılır.
#              Sadece HOST mapping değişir.

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mestech-postgres
    restart: unless-stopped
    mem_limit: 2g
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      POSTGRES_USER: ${PG_USER:-mestech_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD zorunlu - .env dosyasini olusturun}
      POSTGRES_DB: ${PG_DATABASE:-mestech_stok}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${PG_PORT:-3432}:5432"
    volumes:
      - mestech_pgdata:/var/lib/postgresql/data
      - ./Scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-mestech_user} -d ${PG_DATABASE:-mestech_stok}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - default

  redis:
    image: redis:7.4-alpine
    container_name: mestech-redis
    restart: unless-stopped
    user: "999:999"
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-mestech_redis_dev}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --loglevel warning
    ports:
      - "${REDIS_PORT:-3679}:6379"
    volumes:
      - mestech_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mestech_redis_dev}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - default

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: mestech-rabbitmq
    restart: unless-stopped
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp
      - /var/log/rabbitmq
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER zorunlu - .env dosyasini olusturun}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD zorunlu - .env dosyasini olusturun}
      RABBITMQ_PLUGINS: "rabbitmq_management,rabbitmq_prometheus"
    ports:
      - "3672:5672"
      - "3692:15672"
      - "3693:15692"
    volumes:
      - mestech_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: mestech-mysql
    restart: unless-stopped
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/mysqld
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD zorunlu - .env dosyasini olusturun}
      MYSQL_DATABASE: opencart_stok
    ports:
      - "3306:3306"
    volumes:
      - mestech_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:2024.1
    container_name: mestech-seq
    restart: unless-stopped
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "${SEQ_ADMIN_PASSWORD:?SEQ_ADMIN_PASSWORD zorunlu - .env dosyasini olusturun}"
    ports:
      - "3341:5341"
      - "3580:80"
    volumes:
      - mestech_seq_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────
  # MesTech WebAPI — .NET 9.0 (Dalga 14+)
  # ─────────────────────────────────────────
  webapi:
    build:
      context: ../..
      dockerfile: MesTech_Stok/MesTechStok/src/MesTech.WebApi/Dockerfile
    container_name: mestech-webapi
    restart: unless-stopped
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${WEBAPI_PORT:-3100}:5100"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=mestech_stok;Username=mestech_user;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD zorunlu}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-mestech_redis_dev}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER:?RABBITMQ_USER zorunlu}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD zorunlu}"
      Seq__ServerUrl: "http://seq:5341"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5100/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────
  # MinIO — Belge Depolama (Dalga 8)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: mestech-minio
    user: "1000:1000"
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: server /data --console-address ":9001"
    ports:
      - "3900:9000"    # S3 API
      - "3901:9001"    # MinIO Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER zorunlu - .env dosyasini olusturun}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD zorunlu - .env dosyasini olusturun}
    volumes:
      - minio_data:/data
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Nginx — Reverse Proxy (SSL hazırlık)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: mestech-nginx
    restart: unless-stopped
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${NGINX_HTTP_PORT:-3080}:80"
      - "${NGINX_HTTPS_PORT:-3443}:443"
    volumes:
      - ../../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      webapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - default

  # ─────────────────────────────────────────
  # Prometheus — Monitoring (Dalga 14+)
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: mestech-prometheus
    restart: unless-stopped
    user: "65534:65534"
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${PROMETHEUS_PORT:-3090}:9090"
    volumes:
      - ../../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - mestech_prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.external-url=/prometheus/"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - default

  # ─────────────────────────────────────────
  # Grafana — Dashboard UI (Dalga 14+)
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.1
    container_name: mestech-grafana
    restart: unless-stopped
    user: "472:0"
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/log/grafana
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER zorunlu - .env dosyasini olusturun}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD zorunlu - .env dosyasini olusturun}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - mestech_grafana_data:/var/lib/grafana
      - ../../monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - default

volumes:
  mestech_pgdata:
    driver: local
  mestech_redis_data:
    driver: local
  mestech_rabbitmq_data:
    driver: local
  mestech_mysql_data:
    driver: local
  mestech_seq_data:
    driver: local
  minio_data:
    driver: local
  mestech_prometheus_data:
    driver: local
  mestech_grafana_data:
    driver: local

networks:
  default:
    name: mestech-network
    driver: bridge
